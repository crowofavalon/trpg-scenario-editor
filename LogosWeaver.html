<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LogosWeaver</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#0d0f14;--bg-surface:#13161e;--bg-raised:#1a1e29;--bg-overlay:#212636;
  --border:#2a3045;--border-bright:#3d4a6a;
  --accent:#c4962a;--accent-dim:#8a6420;--accent-glow:rgba(196,150,42,.15);
  --accent2:#5b7fa6;--accent2-glow:rgba(91,127,166,.15);
  --text-primary:#e8e0d0;--text-secondary:#9a9080;--text-muted:#5a5448;
  --danger:#9b3a3a;--danger-bright:#c04a4a;--success:#3a7a5a;
  --shadow:0 4px 24px rgba(0,0,0,.6);
  --ib-text-bg:rgba(232,224,208,0.04);--ib-text-border:#3d4a6a;
  --ib-desc-bg:rgba(91,127,166,0.10);--ib-desc-border:#5b7fa6;
  --ib-serif-bg:rgba(196,150,42,0.08);--ib-serif-border:#8a6420;
}
[data-theme="light"]{
  --bg-base:#f5f0e8;--bg-surface:#ede7da;--bg-raised:#e5ddd0;--bg-overlay:#ddd5c5;
  --border:#c8bfaa;--border-bright:#a89880;
  --accent:#8a5c10;--accent-dim:#c4962a;--accent-glow:rgba(138,92,16,.1);
  --accent2:#2a5a80;--accent2-glow:rgba(42,90,128,.1);
  --text-primary:#2a2420;--text-secondary:#5a5040;--text-muted:#9a9080;
  --danger:#8b2a2a;--danger-bright:#b03a3a;--success:#2a6a4a;
  --shadow:0 4px 24px rgba(0,0,0,.15);
  --ib-text-bg:rgba(42,36,32,0.04);--ib-text-border:#a89880;
  --ib-desc-bg:rgba(42,90,128,0.07);--ib-desc-border:#2a5a80;
  --ib-serif-bg:rgba(138,92,16,0.07);--ib-serif-border:#c4962a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}

/* ─── HEADER ─── */
#app-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--bg-surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-brand{display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:1rem;color:var(--accent);letter-spacing:.08em;white-space:nowrap;}
.header-left{display:flex;align-items:center;gap:10px;min-width:0;}
.header-scenario-title{
  font-family:'Crimson Pro',serif;font-size:.95rem;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;
  cursor:pointer;padding:2px 6px;border-radius:3px;transition:all .15s;
  border:1px solid transparent;
}
.header-scenario-title:hover{color:var(--text-primary);border-color:var(--border);background:var(--bg-raised);}
.header-actions{display:flex;gap:5px;align-items:center;}
.header-logo-img{width:22px;height:22px;object-fit:contain;vertical-align:middle;border-radius:50%;margin-right:2px;}
.toolbar-sep{width:1px;height:18px;background:var(--border);margin:0 3px;}
/* ─── VERSION BADGE ─── */
.header-version-badge{
  font-size:.64rem;font-family:'JetBrains Mono',monospace;
  padding:2px 7px;border-radius:8px;
  border:1px solid var(--accent-dim);color:var(--accent);
  background:var(--accent-glow);white-space:nowrap;
  cursor:pointer;transition:all .15s;letter-spacing:.04em;
}
.header-version-badge:hover{background:var(--accent);color:var(--bg-base);}

/* ─── BUTTONS ─── */
.btn{font-family:'Crimson Pro',serif;font-size:.86rem;padding:5px 12px;border:1px solid var(--border);border-radius:4px;background:var(--bg-raised);color:var(--text-primary);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{border-color:var(--border-bright);background:var(--bg-overlay);}
.btn:disabled{opacity:.38;cursor:not-allowed;pointer-events:none;}
.btn-accent{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--accent);}
.btn-accent:hover{background:var(--accent);color:var(--bg-base);border-color:var(--accent);}
.btn-sm{padding:3px 9px;font-size:.78rem;}
.btn-icon{padding:5px 7px;}

/* ─── DROPDOWN ─── */
.dropdown{position:relative;display:inline-flex;}
.dropdown-menu{
  position:absolute;top:calc(100% + 4px);right:0;
  background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:6px;
  box-shadow:var(--shadow);z-index:150;min-width:160px;
  opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .15s;overflow:hidden;
}
.dropdown-menu.open{opacity:1;pointer-events:all;transform:translateY(0);}
.dropdown-item{
  display:flex;align-items:center;gap:8px;padding:9px 14px;
  font-size:.88rem;cursor:pointer;color:var(--text-primary);
  transition:background .1s;border:none;background:none;width:100%;text-align:left;
  font-family:'Crimson Pro',serif;
}
.dropdown-item:hover{background:var(--bg-raised);}
.dropdown-item .di-icon{font-size:1rem;width:18px;text-align:center;}
.dropdown-sep{height:1px;background:var(--border);margin:3px 0;}

/* ─── LAYOUT ─── */
#app-body{display:grid;grid-template-columns:264px 1fr;height:calc(100vh - 52px);}

/* ─── SIDEBAR ─── */
#sidebar{background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tab{flex:1;padding:9px 4px;text-align:center;font-size:.7rem;font-family:'Cinzel',serif;letter-spacing:.05em;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;}
.sidebar-tab:hover{color:var(--text-secondary);}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sidebar-panel{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.sidebar-panel.active{display:flex;}
.sidebar-panel-header{padding:9px 12px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sidebar-panel-title{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;}
.sidebar-list{flex:1;overflow-y:auto;padding:0 7px 8px;min-height:0;}
.sidebar-list::-webkit-scrollbar{width:4px;}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sidebar-footer{font-size:.68rem;color:var(--text-muted);text-align:center;padding:5px 0;border-top:1px solid var(--border);flex-shrink:0;}

/* ─── SIDEBAR FILTER ─── */
.sidebar-filter-wrap{padding:6px 10px 2px;flex-shrink:0;}
.sidebar-filter{
  width:100%;font-family:'Crimson Pro',serif;font-size:.84rem;
  background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;
  color:var(--text-primary);padding:4px 9px;outline:none;
  transition:border-color .15s;
}
.sidebar-filter:focus{border-color:var(--accent-dim);}

/* ─── BLOCK ITEMS ─── */
.block-item{display:flex;align-items:center;gap:6px;padding:6px 7px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg-raised);margin-bottom:2px;transition:all .15s;user-select:none;}
.block-item:hover{border-color:var(--border-bright);}
.block-item.selected{border-color:var(--accent-dim);background:var(--accent-glow);}
.block-item.drag-over{border-color:var(--accent);border-style:dashed;background:var(--accent-glow);}
.block-item.dragging{opacity:.3;}
.drag-handle{color:var(--text-muted);font-size:.85rem;cursor:grab;padding:0 1px;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.block-icon{font-size:.9rem;flex-shrink:0;}
.block-label{flex:1;font-size:.85rem;}
.block-badge{font-size:.63rem;font-family:'JetBrains Mono',monospace;padding:1px 4px;border-radius:3px;background:var(--bg-overlay);border:1px solid var(--border);color:var(--text-muted);}
.block-badge.ho{border-color:#5b7fa6;color:#5b7fa6;}
.block-badge.sc{border-color:#8a6420;color:var(--accent);}
.block-chevron{color:var(--text-muted);font-size:.7rem;transition:transform .15s;flex-shrink:0;}
.block-chevron.open{transform:rotate(90deg);}

/* ─── TREE CHILDREN ─── */
.tree-children{padding-left:14px;border-left:1px solid var(--border);margin:2px 0 3px 10px;}
.tree-child{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:3px;cursor:pointer;border:1px solid transparent;font-size:.82rem;color:var(--text-secondary);transition:all .12s;user-select:none;margin-bottom:1px;}
.tree-child:hover{background:var(--bg-raised);border-color:var(--border);color:var(--text-primary);}
.tree-child.selected{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--text-primary);}
.tree-child.drag-over{border-color:var(--accent);border-style:dashed;}
.tree-child.dragging{opacity:.3;}
.tree-dot{width:5px;height:5px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
.tree-child.selected .tree-dot{background:var(--accent);}
.tree-child-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tree-child-drag{color:var(--text-muted);font-size:.78rem;cursor:grab;padding:0 2px;flex-shrink:0;}
.tree-child-drag:active{cursor:grabbing;}

/* ─── ENTITY CARDS ─── */
.entity-card{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg-raised);margin-bottom:2px;transition:all .15s;user-select:none;}
.entity-card:hover{border-color:var(--border-bright);}
.entity-card.selected{border-color:var(--accent-dim);background:var(--accent-glow);}
.entity-card.drag-over{border-color:var(--accent);border-style:dashed;}
.entity-card.dragging{opacity:.3;}
.entity-info{flex:1;overflow:hidden;}
.entity-name{font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entity-sub{font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entity-del{display:none;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.76rem;padding:2px 4px;border-radius:3px;}
.entity-del:hover{color:var(--danger-bright);}
.entity-card:hover .entity-del{display:block;}

/* ─── MAIN EDITOR ─── */
#main-editor{display:flex;flex-direction:column;overflow:hidden;}
.editor-toolbar{display:flex;align-items:center;gap:8px;padding:8px 18px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.editor-title-display{font-family:'Cinzel',serif;font-size:1rem;color:var(--text-primary);flex:1;letter-spacing:.06em;}
.editor-badge{font-size:.7rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.editor-content{flex:1;overflow-y:auto;padding:20px 26px 40px;}
.editor-content::-webkit-scrollbar{width:6px;}
.editor-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ─── SECTION CARDS ─── */
.section-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:15px;}
.section-header{padding:8px 13px;background:var(--bg-raised);border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;color:var(--text-secondary);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.section-body{padding:13px;display:flex;flex-direction:column;gap:11px;}

/* ─── FIELDS ─── */
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-label{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;}
.field-input,.field-select{font-family:'Crimson Pro',serif;font-size:.94rem;background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);padding:6px 10px;outline:none;width:100%;transition:border-color .15s;}
.field-input:focus,.field-select:focus{border-color:var(--accent-dim);box-shadow:0 0 0 2px var(--accent-glow);}
.field-select option{background:var(--bg-raised);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}

/* ─── AUTO-RESIZE TEXTAREA ─── */
.auto-ta{
  font-family:'Crimson Pro',serif;font-size:.94rem;
  background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;
  color:var(--text-primary);padding:7px 10px;outline:none;width:100%;
  resize:none;overflow:hidden;line-height:1.65;min-height:58px;
  transition:border-color .15s;display:block;
}
.auto-ta:focus{border-color:var(--accent-dim);box-shadow:0 0 0 2px var(--accent-glow);}
.auto-ta.italic{font-style:italic;}

/* ─── SCENE CARDS ─── */
.honpen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.scene-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;margin-bottom:13px;overflow:hidden;}
.scene-card.drag-over{border-color:var(--accent);border-style:dashed;}
.scene-card.dragging{opacity:.3;}
.scene-card-header{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--bg-raised);border-bottom:1px solid var(--border);}
.scene-num{font-family:'Cinzel',serif;font-size:.64rem;color:var(--accent);letter-spacing:.1em;flex-shrink:0;}
.scene-title-input{flex:1;background:transparent;border:none;outline:none;font-family:'Crimson Pro',serif;font-size:.9rem;color:var(--text-primary);padding:0 5px;}
.scene-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.76rem;padding:2px 5px;border-radius:3px;}
.scene-del:hover{color:var(--danger-bright);}
.scene-body{padding:11px;display:flex;flex-direction:column;gap:9px;}

/* ─── INLINE BLOCKS ─── */
.inline-editor{display:flex;flex-direction:column;gap:5px;}

/* 本文 */
.ib{border-radius:5px;border-left:3px solid var(--ib-text-border);background:var(--ib-text-bg);position:relative;}

/* 描写 : 青系・左太ボーダー＋薄い背景 */
.ib.ib-desc{
  border-left:4px solid var(--ib-desc-border);
  background:var(--ib-desc-bg);
  border-radius:0 5px 5px 0;
}

/* セリフ : 金系・上下ボーダー＋引用符装飾 */
.ib.ib-serif{
  border-left:none;
  border-top:2px solid var(--ib-serif-border);
  border-bottom:2px solid var(--ib-serif-border);
  background:var(--ib-serif-bg);
  border-radius:3px;
  padding-left:28px;  /* 引用符スペース */
}
.ib.ib-serif::before{
  content:'❝';
  position:absolute;
  left:6px;top:6px;
  font-size:1rem;
  color:var(--accent-dim);
  line-height:1;
  pointer-events:none;
}

.ib-top{display:flex;align-items:center;gap:5px;padding:4px 8px 2px;}
.ib-serif .ib-top{padding-left:4px;}  /* ::before分補正 */
.ib-type-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.ib-desc .ib-type-label{color:var(--accent2);}
.ib-serif .ib-type-label{color:var(--accent);}
.ib-drag{color:var(--text-muted);cursor:grab;font-size:.78rem;}
.ib-drag:active{cursor:grabbing;}
.ib-del{margin-left:auto;background:none;border:none;cursor:pointer;color:transparent;font-size:.72rem;padding:1px 5px;border-radius:3px;transition:color .1s;}
.ib:hover .ib-del{color:var(--text-muted);}
.ib-del:hover{color:var(--danger-bright)!important;}
.ib .auto-ta{background:transparent;border:none;box-shadow:none!important;padding:2px 10px 7px;}
.ib-serif .auto-ta{font-style:italic;color:var(--text-primary);}
.inline-add-bar{display:flex;gap:5px;padding:2px 0 0;}

/* ─── IB NPC PREVIEW ─── */

/* ─── HO CARDS ─── */
.ho-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;margin-bottom:11px;overflow:hidden;}
.ho-card-header{display:flex;align-items:center;gap:7px;padding:6px 11px;background:var(--bg-raised);border-bottom:1px solid var(--border);}
.ho-card-head-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ho-num{font-family:'Cinzel',serif;font-size:.64rem;color:var(--accent2);letter-spacing:.1em;flex-shrink:0;}
.ho-title-input{flex:1;background:transparent;border:none;outline:none;font-family:'Crimson Pro',serif;font-size:.88rem;font-weight:600;color:var(--text-primary);padding:0 4px;}
.ho-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.76rem;padding:2px 5px;border-radius:3px;}
.ho-del:hover{color:var(--danger-bright);}
.ho-body{padding:11px;display:flex;flex-direction:column;gap:9px;}

/* ─── TAGS ─── */
.tag-list{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.tag{font-size:.74rem;padding:2px 7px;border-radius:10px;background:var(--bg-overlay);border:1px solid var(--border);color:var(--text-secondary);display:inline-flex;align-items:center;gap:3px;}
.tag-x{cursor:pointer;color:var(--text-muted);line-height:1;}
.tag-x:hover{color:var(--danger-bright);}

/* ─── MINI BTN ─── */
.mini-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.74rem;padding:1px 5px;border-radius:3px;transition:all .1s;}
.mini-btn:hover{color:var(--text-primary);background:var(--bg-overlay);}

/* ─── EMPTY STATE ─── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;gap:11px;color:var(--text-muted);text-align:center;}
.empty-icon{font-size:2.4rem;opacity:.4;}
.empty-title{font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.08em;}
.empty-sub{font-size:.84rem;}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:8px;width:460px;max-width:92vw;box-shadow:var(--shadow);transform:translateY(10px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-head{padding:13px 17px;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.06em;color:var(--accent);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:11px;}
.modal-foot{padding:11px 17px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px;}

/* ─── SAVE MODAL SPECIFIC ─── */
.save-row{display:flex;flex-direction:column;gap:8px;}
.save-filename{display:flex;align-items:center;gap:8px;}
.save-filename input{flex:1;}
.save-filename span{color:var(--text-muted);font-size:.88rem;white-space:nowrap;}

/* ─── EXPORT MODAL ─── */
.export-opts{display:flex;flex-direction:column;gap:6px;}
.export-opt{
  display:flex;align-items:center;gap:10px;padding:10px 13px;
  border:1px solid var(--border);border-radius:5px;cursor:pointer;
  background:var(--bg-raised);transition:all .15s;
}
.export-opt:hover{border-color:var(--border-bright);background:var(--bg-overlay);}
.export-opt.selected{border-color:var(--accent-dim);background:var(--accent-glow);}
.export-opt-icon{font-size:1.3rem;width:28px;text-align:center;}
.export-opt-info{flex:1;}
.export-opt-name{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.05em;color:var(--text-primary);}
.export-opt-desc{font-size:.78rem;color:var(--text-muted);margin-top:2px;}
.export-radio{width:16px;height:16px;accent-color:var(--accent);}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg-overlay);border:1px solid var(--border-bright);border-radius:6px;padding:8px 15px;font-size:.85rem;color:var(--text-primary);z-index:300;transform:translateY(14px);opacity:0;transition:all .22s;pointer-events:none;display:flex;align-items:center;gap:10px;}
#toast.show{transform:translateY(0);opacity:1;pointer-events:auto;}
#toast.ok{border-color:var(--success);color:#7ac9a0;}
#toast.autosave{border-color:var(--accent2);color:#8ab4d4;}
#toast-undo-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.05em;padding:2px 9px;border:1px solid currentColor;border-radius:3px;background:none;color:inherit;cursor:pointer;white-space:nowrap;opacity:.85;flex-shrink:0;}
#toast-undo-btn:hover{opacity:1;background:rgba(255,255,255,.08);}
#toast-msg{flex:1;}

/* ─── SAVE STATUS ─── */
#save-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.72rem;font-family:'JetBrains Mono',monospace;
  padding:2px 8px;border-radius:10px;
  border:1px solid var(--border);color:var(--text-muted);
  background:var(--bg-raised);transition:all .4s;
  white-space:nowrap;
}
#save-status.dirty{border-color:var(--accent-dim);color:var(--accent);background:var(--accent-glow);}
#save-status.saved{border-color:var(--success);color:#7ac9a0;background:rgba(58,122,90,.12);}
#save-status.autosaved{border-color:var(--accent2);color:#8ab4d4;background:var(--accent2-glow);}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ─── RESTORE BANNER ─── */
#restore-banner{
  display:none;position:fixed;bottom:58px;right:20px;z-index:290;
  background:var(--bg-surface);border:1px solid var(--accent-dim);border-radius:8px;
  padding:14px 16px;box-shadow:var(--shadow);max-width:300px;
}
#restore-banner.show{display:block;}
.restore-title{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.06em;color:var(--accent);margin-bottom:6px;}
.restore-info{font-size:.82rem;color:var(--text-secondary);margin-bottom:10px;line-height:1.5;}
.restore-btns{display:flex;gap:6px;}

/* ─── SCENE STATUS ─── */
.scene-status{
  display:inline-flex;align-items:center;gap:3px;
  font-size:.68rem;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
  padding:2px 7px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);color:var(--text-muted);
  background:var(--bg-overlay);transition:all .15s;white-space:nowrap;
  user-select:none;
}
.scene-status:hover{border-color:var(--border-bright);}
.scene-status.s-todo{border-color:var(--border);color:var(--text-muted);}
.scene-status.s-wip{border-color:var(--accent-dim);color:var(--accent);background:var(--accent-glow);}
.scene-status.s-done{border-color:var(--success);color:#7ac9a0;background:rgba(58,122,90,.12);}

/* ツリー内ステータスドット */
.tree-status-dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;display:inline-block;margin-right:2px;}
.tree-status-dot.s-wip{background:var(--accent);}
.tree-status-dot.s-done{background:#7ac9a0;}

/* ─── SCENE COLLAPSE ─── */
.scene-collapse-btn{
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  font-size:.78rem;padding:2px 5px;border-radius:3px;transition:color .15s;
  line-height:1;
}
.scene-collapse-btn:hover{color:var(--text-primary);}
.scene-body.collapsed{display:none;}

/* ─── NPC COPY BTN ─── */
.entity-copy{
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  font-size:.8rem;padding:3px 5px;border-radius:3px;transition:color .15s;
  flex-shrink:0;
}
.entity-copy:hover{color:var(--accent2);}

/* ─── HO PRINT ─── */
.ho-print-btn{
  font-size:.72rem;padding:2px 8px;border-radius:3px;
  background:var(--accent2-glow);border:1px solid var(--accent2);
  color:var(--accent2);cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.04em;
  transition:background .12s;white-space:nowrap;
}
.ho-print-btn:hover{background:rgba(91,127,166,.28);}
.ho-card-head-actions{display:flex;align-items:center;gap:6px;}

/* ─── IB SPEAKER ─── */
.ib-speaker-select{
  font-family:'Crimson Pro',serif;font-size:.78rem;
  background:var(--bg-overlay);border:1px solid var(--border);border-radius:4px;
  color:var(--text-secondary);padding:1px 5px;cursor:pointer;
  max-width:140px;flex-shrink:0;
}
.ib-speaker-select:focus{outline:none;border-color:var(--accent-dim);}
.ib-speaker-name{
  font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.06em;
  color:var(--accent);padding:4px 10px 0;
  border-top:1px dashed var(--ib-serif-border);
  margin-top:2px;
}

/* 登場NPC タグ ホバー対応 */
.tag-npc-hover{cursor:default;transition:border-color .12s,color .12s,background .12s;}
.tag-npc-hover:hover{border-color:var(--accent2);color:var(--accent2);background:var(--accent2-glow);}

/* 閲覧モード 話者名 */
.v-serif-speaker{
  font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.07em;
  color:var(--accent);padding-left:2px;margin-bottom:1px;
}

/* ─── NPC IMAGE ─── */
.npc-info-with-image{display:flex;gap:16px;align-items:flex-start;}
.npc-fields{flex:1;min-width:0;}
.npc-image-area{
  width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;
}
.npc-image-box{
  width:150px;height:150px;border:2px dashed var(--border-bright);border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .15s,background .15s;
  background:var(--bg-raised);overflow:hidden;position:relative;
}
.npc-image-box:hover{border-color:var(--accent-dim);background:var(--accent-glow);}
.npc-image-box img{width:100%;height:100%;object-fit:cover;display:block;}
.npc-image-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  color:var(--text-muted);font-size:.78rem;text-align:center;padding:8px;
  pointer-events:none;
}
.npc-image-placeholder span{font-size:1.6rem;}
.npc-image-actions{display:flex;gap:5px;}
.npc-img-btn{
  flex:1;font-family:'Crimson Pro',serif;font-size:.74rem;
  padding:3px 0;border-radius:3px;border:1px solid var(--border);
  background:var(--bg-overlay);color:var(--text-secondary);cursor:pointer;
  text-align:center;transition:all .12s;
}
.npc-img-btn:hover{border-color:var(--border-bright);color:var(--text-primary);}
.npc-img-btn.danger:hover{border-color:var(--danger);color:var(--danger-bright);}

/* ─── 資料ブロック (ib-image) ─── */
.ib-image{background:var(--bg-raised);border:1px solid var(--border);border-radius:5px;}
.ib-image-upload-area{
  min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;gap:4px;color:var(--text-muted);font-size:.82rem;
  border-radius:0 0 4px 4px;transition:background .12s;padding:16px;
}
.ib-image-upload-area:hover{background:var(--bg-overlay);}
.ib-image-preview{
  position:relative;padding:8px 10px 6px;
}
.ib-image-preview img{
  max-width:100%;border-radius:4px;display:block;
  max-height:400px;object-fit:contain;
}
.ib-image-caption{
  font-size:.82rem;color:var(--text-secondary);padding:4px 2px 0;
  background:transparent;border:none;outline:none;width:100%;
  font-family:'Crimson Pro',serif;
}
.ib-image-caption::placeholder{color:var(--text-muted);}
.ib-image-del-img{
  position:absolute;top:12px;right:14px;
  background:var(--bg-overlay);border:1px solid var(--border);
  border-radius:3px;padding:1px 6px;font-size:.72rem;
  color:var(--text-muted);cursor:pointer;
}
.ib-image-del-img:hover{color:var(--danger-bright);border-color:var(--danger);}

/* 閲覧モードの画像 */
.v-ib-image{margin:4px 0;text-align:center;}
.v-ib-image img{max-width:100%;border-radius:4px;max-height:500px;object-fit:contain;}
.v-ib-image-caption{font-size:.84rem;color:var(--text-muted);margin-top:4px;}
.v-npc-image{width:140px;height:140px;object-fit:cover;border-radius:5px;float:right;margin:0 0 8px 14px;}

/* ─── NPC POPUP ─── */
#npc-popup{
  position:fixed;z-index:400;
  background:var(--bg-surface);border:1px solid var(--border-bright);
  border-radius:8px;box-shadow:var(--shadow);
  width:280px;padding:0;overflow:hidden;
  opacity:0;pointer-events:none;transform:translateY(6px);
  transition:opacity .15s,transform .15s;
}
#npc-popup.show{opacity:1;pointer-events:all;transform:translateY(0);}
.popup-head{
  padding:10px 14px;background:var(--bg-raised);
  border-bottom:1px solid var(--border);
  display:flex;align-items:baseline;gap:8px;
}
.popup-name{
  font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;
  color:var(--text-primary);flex:1;
}
.popup-faction{
  font-size:.72rem;font-family:'JetBrains Mono',monospace;
  padding:1px 6px;border-radius:8px;
  background:var(--bg-overlay);border:1px solid var(--border);
  color:var(--text-muted);white-space:nowrap;
}
.popup-faction.f-ally{border-color:#3a7a5a;color:#7ac9a0;}
.popup-faction.f-enemy{border-color:var(--danger);color:var(--danger-bright);}
.popup-faction.f-neutral{border-color:var(--accent-dim);color:var(--accent);}
.popup-body{padding:10px 14px;display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;}
.popup-row{display:flex;flex-direction:column;gap:2px;}
.popup-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);}
.popup-value{font-size:.86rem;color:var(--text-secondary);line-height:1.55;white-space:pre-wrap;}
.popup-foot{
  padding:7px 14px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;
}
.popup-jump{font-size:.78rem;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Cinzel',serif;letter-spacing:.04em;}
.popup-jump:hover{text-decoration:underline;}

/* ─── BLOCK FIXED (dashboard) ─── */
.block-fixed{cursor:pointer;user-select:none;}
.block-fixed:hover{border-color:var(--border-bright);}

@keyframes fadeInDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

/* ─── SEARCH BAR ─── */
#search-bar{
  display:none;position:fixed;top:52px;left:0;right:0;z-index:90;
  background:var(--bg-surface);border-bottom:1px solid var(--border-bright);
  padding:8px 16px;gap:8px;align-items:center;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#search-bar.open{display:flex;}
#search-input{
  flex:1;font-family:'Crimson Pro',serif;font-size:.96rem;
  background:var(--bg-raised);border:1px solid var(--border-bright);border-radius:5px;
  color:var(--text-primary);padding:6px 12px;outline:none;
}
#search-input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 2px var(--accent-glow);}
#search-count{font-size:.8rem;color:var(--text-muted);white-space:nowrap;min-width:72px;text-align:center;font-family:'JetBrains Mono',monospace;}
#search-results{
  position:absolute;top:100%;left:0;right:0;
  background:var(--bg-surface);border-bottom:1px solid var(--border);
  max-height:320px;overflow-y:auto;
}
.search-result-item{
  padding:8px 16px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .1s;
}
.search-result-item:hover{background:var(--bg-raised);}
.search-result-item.current{
  background:var(--accent-glow);
  border-left:3px solid var(--accent);
  padding-left:13px;
}
.sr-label{font-size:.72rem;color:var(--accent);font-family:'Cinzel',serif;letter-spacing:.06em;margin-bottom:2px;}
.sr-context{font-size:.88rem;color:var(--text-secondary);line-height:1.5;}
.sr-context mark{background:var(--accent-glow);color:var(--accent);border-radius:2px;padding:0 2px;font-weight:600;}
.sr-context mark.current-match{background:var(--accent);color:var(--bg-base);border-radius:2px;padding:0 3px;}

/* ─── VIEWER OVERLAY ─── */
#viewer-overlay{
  display:none;position:fixed;inset:0;z-index:180;
  background:var(--bg-base);overflow-y:auto;
}
#viewer-overlay.open{display:block;}
#viewer-header{
  position:sticky;top:0;z-index:10;
  background:var(--bg-surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;
}
#viewer-header h1{font-family:'Cinzel',serif;font-size:1rem;color:var(--accent);letter-spacing:.08em;}
#viewer-body{max-width:840px;margin:0 auto;padding:32px 24px 64px;}

/* ─── VIEWER CONTENT STYLES ─── */
.v-scenario-title{
  font-family:'Cinzel',serif;font-size:2rem;font-weight:700;
  color:var(--text-primary);text-align:center;letter-spacing:.08em;
  margin-bottom:8px;
}
.v-scenario-sub{text-align:center;color:var(--text-muted);font-size:.88rem;margin-bottom:32px;}
.v-info-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
.v-info-table td{padding:7px 12px;border:1px solid var(--border);font-size:.9rem;}
.v-info-table td:first-child{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;
  color:var(--text-muted);background:var(--bg-raised);width:140px;text-transform:uppercase;
}
.v-section{margin-bottom:36px;}
.v-section-title{
  font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);border-bottom:1px solid var(--accent-dim);padding-bottom:6px;margin-bottom:14px;
}
.v-subsection-title{
  font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.08em;
  color:var(--text-secondary);margin:16px 0 8px;
}
.v-body{line-height:1.8;font-size:.96rem;white-space:pre-wrap;}
.v-label{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;}
.v-value{font-size:.94rem;margin-bottom:10px;}
.v-ho-card{
  border:1px solid var(--border);border-radius:5px;margin-bottom:14px;overflow:hidden;
}
.v-ho-head{
  background:var(--bg-raised);padding:7px 14px;
  font-family:'Cinzel',serif;font-size:.76rem;letter-spacing:.08em;
  color:var(--accent2);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:baseline;
}
.v-ho-name{font-size:.92rem;color:var(--text-primary);font-family:'Crimson Pro',serif;font-weight:600;}
.v-ho-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.v-scene-card{
  border:1px solid var(--border);border-radius:5px;margin-bottom:18px;overflow:hidden;
}
.v-scene-head{
  background:var(--bg-raised);padding:7px 14px;
  display:flex;gap:10px;align-items:baseline;border-bottom:1px solid var(--border);
}
.v-scene-num{font-family:'Cinzel',serif;font-size:.66rem;color:var(--accent);letter-spacing:.1em;}
.v-scene-name{font-family:'Crimson Pro',serif;font-size:.98rem;font-weight:600;color:var(--text-primary);}
.v-scene-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.v-scene-meta{display:flex;gap:18px;flex-wrap:wrap;font-size:.84rem;color:var(--text-secondary);}
.v-scene-meta span{display:flex;gap:4px;align-items:center;}
.v-scene-meta b{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);}
.v-ib{margin:3px 0;}
.v-ib-text{line-height:1.8;font-size:.95rem;white-space:pre-wrap;}
.v-ib-desc{
  border-left:4px solid var(--ib-desc-border);background:var(--ib-desc-bg);
  padding:8px 12px;border-radius:0 4px 4px 0;font-size:.94rem;line-height:1.8;
  white-space:pre-wrap;color:var(--text-primary);
}
.v-ib-serif{
  border-top:2px solid var(--ib-serif-border);border-bottom:2px solid var(--ib-serif-border);
  background:var(--ib-serif-bg);padding:8px 12px 8px 28px;border-radius:3px;
  font-style:italic;font-size:.95rem;line-height:1.8;white-space:pre-wrap;
  position:relative;color:var(--text-primary);
}
.v-ib-serif::before{content:'❝';position:absolute;left:8px;top:7px;color:var(--accent-dim);font-style:normal;}
.v-npc-card{
  border:1px solid var(--border);border-radius:5px;margin-bottom:14px;
  padding:12px 14px;
}
.v-npc-name{font-family:'Crimson Pro',serif;font-size:1.05rem;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
.v-npc-sub{font-size:.82rem;color:var(--text-muted);margin-bottom:8px;}
.v-divider{height:1px;background:var(--border);margin:28px 0;}

@media print{
  #app-header,#sidebar,.editor-toolbar,#search-bar{display:none!important;}
  #app-body{display:block;}
  #main-editor{height:auto;overflow:visible;}
  .editor-content{overflow:visible;padding:0;}
  body{background:#fff;color:#000;}
  #viewer-overlay{position:static!important;overflow:visible!important;}
  #viewer-header{display:none!important;}
  #viewer-body{padding:0!important;}
}

/* ══════════════════════════════════════════
   MOBILE LAYOUT  (max-width: 767px)
   ══════════════════════════════════════════ */
@media(max-width:767px){

  /* ─── ヘッダー ─── */
  #app-header{padding:0 10px;height:48px;}
  .header-left{gap:6px;}
  .header-brand{font-size:.82rem;}
  .header-scenario-title{max-width:110px;font-size:.82rem;}

  /* PC専用ボタンを非表示 */
  .header-actions .btn:not(#sp-save-btn):not(#sp-load-btn):not(#theme-btn){display:none;}
  .header-actions .toolbar-sep{display:none;}
  #save-status{display:none;}
  .header-version-badge{display:none;}

  /* スマホ用ヘッダーアクション */
  #sp-header-actions{display:flex;gap:5px;align-items:center;}

  /* ─── レイアウト ─── */
  #app-body{
    display:flex;flex-direction:column;
    height:calc(100vh - 48px);
    overflow:hidden;
  }

  /* ─── サイドバー → スライドパネル ─── */
  #sidebar{
    position:fixed;top:48px;left:0;bottom:56px;
    width:85vw;max-width:320px;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:120;
    border-right:1px solid var(--border-bright);
    box-shadow:4px 0 24px rgba(0,0,0,.5);
  }
  #sidebar.sp-open{transform:translateX(0);}
  #sp-sidebar-overlay{
    display:none;position:fixed;inset:0;top:48px;bottom:56px;
    background:rgba(0,0,0,.5);z-index:119;
  }
  #sp-sidebar-overlay.show{display:block;}

  /* ─── メインエディタ ─── */
  #main-editor{
    flex:1;display:flex;flex-direction:column;overflow:hidden;
    padding-bottom:0;
  }
  .editor-toolbar{
    padding:6px 12px;flex-shrink:0;
    display:flex;align-items:center;gap:6px;
  }
  .editor-title-display{font-size:.88rem;}
  .editor-content{
    flex:1;overflow-y:auto;padding:10px 12px 16px;
  }

  /* ─── ボトムナビゲーションバー ─── */
  #sp-bottom-nav{
    position:fixed;bottom:0;left:0;right:0;height:56px;
    background:var(--bg-surface);border-top:1px solid var(--border);
    display:flex;align-items:stretch;z-index:110;
  }
  .sp-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;background:none;border:none;cursor:pointer;
    color:var(--text-muted);transition:color .15s;padding:0;
    font-family:'Cinzel',serif;
  }
  .sp-nav-btn.active{color:var(--accent);}
  .sp-nav-btn:hover{color:var(--text-secondary);}
  .sp-nav-icon{font-size:1.25rem;line-height:1;}
  .sp-nav-label{font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;}
  .sp-nav-sep{width:1px;background:var(--border);margin:8px 0;flex-shrink:0;}

  /* ─── セクションカード ─── */
  .section-card{margin-bottom:10px;}
  .section-body{padding:10px;}
  .grid2{grid-template-columns:1fr;gap:8px;}

  /* ─── NPC画像レイアウト ─── */
  .npc-info-with-image{flex-direction:column-reverse;gap:10px;}
  .npc-image-area{width:100%;flex-direction:row;align-items:center;gap:10px;}
  .npc-image-box{width:90px;height:90px;flex-shrink:0;}

  /* ─── シーンカード ─── */
  .scene-card-header{gap:4px;}
  .scene-status{font-size:.62rem;padding:1px 5px;}
  .scene-num{font-size:.6rem;}

  /* ─── インラインブロック ─── */
  .inline-add-bar{flex-wrap:wrap;gap:4px;}
  .inline-add-bar .btn{font-size:.74rem;padding:3px 8px;}

  /* ─── HO カード ─── */
  .ho-card-header{gap:4px;}

  /* ─── フォーム要素 ─── */
  .field-input,.field-select{font-size:.95rem;padding:7px 10px;}
  .field-label{font-size:.68rem;}

  /* ─── モーダル ─── */
  .modal{width:95vw;max-height:88vh;}
  .modal-body{padding:14px;}

  /* ─── ビューワー ─── */
  #viewer-header{padding:0 12px;height:48px;}
  #viewer-body{padding:16px 14px 80px;}

  /* ─── 検索バー ─── */
  #search-bar{top:48px;padding:6px 10px;}
  #search-input{font-size:.9rem;}

  /* ─── スマホ用保存ボタン（ヘッダー内） ─── */
  #sp-save-btn,#sp-load-btn{padding:4px 8px;font-size:.75rem;}

  /* ─── ポップアップ ─── */
  #npc-popup{width:calc(100vw - 24px);max-width:320px;}

  /* ─── ツールバータイトル横のメニューボタン ─── */
  #sp-menu-btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:4px;
    background:var(--bg-raised);border:1px solid var(--border);
    cursor:pointer;font-size:1rem;color:var(--text-secondary);flex-shrink:0;
  }
}

/* PC では スマホ専用要素を非表示 */
@media(min-width:768px){
  #sp-bottom-nav{display:none!important;}
  #sp-sidebar-overlay{display:none!important;}
  #sp-menu-btn{display:none!important;}
  #sp-header-actions{display:none!important;}
}

/* iPhone セーフエリア対応 */
@supports(padding-bottom: env(safe-area-inset-bottom)){
  @media(max-width:767px){
    #sp-bottom-nav{
      padding-bottom:env(safe-area-inset-bottom);
      height:calc(56px + env(safe-area-inset-bottom));
    }
    #app-body{height:calc(100vh - 48px - env(safe-area-inset-bottom));}
    #viewer-body{padding-bottom:calc(80px + env(safe-area-inset-bottom));}
  }
}
</style>
</head>

<script>
(()=>{  // ── IIFE START（グローバル汚染防止）──
// ══════════════════════════════════════════
//  DEFS & STATE
// ══════════════════════════════════════════
const BLOCK_DEFS=[
  {key:'dashboard',label:'ダッシュボード',icon:'🗂',badge:null,fixed:true},
  {key:'gaiyou', label:'概要',          icon:'📋',badge:null},
  {key:'haikei', label:'背景',          icon:'📖',badge:null},
  {key:'shinsou',label:'真相',          icon:'🔍',badge:null},
  {key:'handout',label:'ハンドアウト',  icon:'📄',badge:'ho'},
  {key:'honpen', label:'本編',          icon:'🎭',badge:'sc'},
  {key:'after',  label:'アフタープレイ',icon:'🌅',badge:null},
];

let S={
  scenarioName:'新しいシナリオ',
  blockOrder:BLOCK_DEFS.map(b=>b.key),
  blocks:{
    dashboard:{system:'',players:'',level:'',playtime:'',regulation:'',preview:''},
    gaiyou:{content:''},haikei:{content:''},shinsou:{content:''},
    handout:{items:[]},honpen:{scenes:[]},after:{content:''},
  },
  npcs:[],infos:[],
  sel:{type:null,id:null},
  treeOpen:{handout:true,honpen:true},
};
let _id=1;
const uid=()=>'x'+((_id++).toString(36));

// ══════════════════════════════════════════
//  AUTO-RESIZE
// ══════════════════════════════════════════
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function initAR(el){el.querySelectorAll('textarea.auto-ta').forEach(ta=>{autoResize(ta);});}
document.addEventListener('input',e=>{if(e.target.classList.contains('auto-ta'))autoResize(e.target);});

// ══════════════════════════════════════════
//  BLOCK LIST (with tree children)
// ══════════════════════════════════════════
let dragBlk=null,dragHo=null,dragSc=null;

function renderBlockList(){
  const el=document.getElementById('block-list');
  // ダッシュボードは常に先頭固定（ドラッグ不可）
  const dashDef=BLOCK_DEFS.find(d=>d.key==='dashboard');
  const isDashSel=S.sel.type==='block'&&S.sel.id==='dashboard';
  const dashHTML=`<div class="block-item${isDashSel?' selected':''} block-fixed" onclick="selBlock('dashboard')">
    <span class="block-icon">${dashDef.icon}</span>
    <span class="block-label">${dashDef.label}</span>
    <span class="block-badge" style="border-color:var(--accent-dim);color:var(--accent);font-size:.58rem;">固定</span>
  </div>`;

  const draggableHTML=S.blockOrder.filter(k=>k!=='dashboard').map(key=>{
    const d=BLOCK_DEFS.find(x=>x.key===key);
    const isBlkSel=S.sel.type==='block'&&S.sel.id===key;
    const badge=d.badge?`<span class="block-badge ${d.badge}">${d.badge==='ho'?'HO':'SC'}</span>`:'';
    let childrenHTML='';

    if(key==='handout'){
      const open=S.treeOpen.handout;
      const chevron=`<span class="block-chevron${open?' open':''}" id="chev-handout">▶</span>`;
      const items=S.blocks.handout.items;
      if(open&&items.length){
        childrenHTML=`<div class="tree-children" id="tree-handout">
          ${items.map(ho=>{
            const sel=S.sel.type==='ho'&&S.sel.id===ho.id;
            return `<div class="tree-child${sel?' selected':''}" data-hoid="${ho.id}" draggable="true"
              onclick="selHo('${ho.id}');event.stopPropagation()"
              ondragstart="hoDragStart(event,'${ho.id}')"
              ondragover="hoDragOver(event,'${ho.id}')"
              ondragleave="hoDragLeave(event,'${ho.id}')"
              ondrop="hoDrop(event,'${ho.id}')">
              <span class="tree-child-drag" onclick="event.stopPropagation()">≡</span>
              <span class="tree-dot"></span>
              <span class="tree-child-label">${esc(ho.name||'(無題)')}</span>
            </div>`;
          }).join('')}
        </div>`;
      }
      return `<div class="block-item${isBlkSel?' selected':''}" draggable="true" data-key="${key}"
        ondragstart="blkDragStart(event,'${key}')"
        ondragover="blkDragOver(event,'${key}')"
        ondragleave="blkDragLeave(event,'${key}')"
        ondrop="blkDrop(event,'${key}')">
        <span class="drag-handle">≡</span>
        <span class="block-icon">${d.icon}</span>
        <span class="block-label" onclick="selBlock('${key}');event.stopPropagation()">${d.label}</span>
        ${badge}
        ${items.length?chevron:''}
      </div>
      ${childrenHTML}`;
    }

    if(key==='honpen'){
      const open=S.treeOpen.honpen;
      const scenes=S.blocks.honpen.scenes;
      const chevron=`<span class="block-chevron${open?' open':''}" id="chev-honpen">▶</span>`;
      if(open&&scenes.length){
        childrenHTML=`<div class="tree-children" id="tree-honpen">
          ${scenes.map(sc=>{
            const sel=S.sel.type==='scene'&&S.sel.id===sc.id;
            return `<div class="tree-child${sel?' selected':''}" data-scid="${sc.id}" draggable="true"
              onclick="selScene('${sc.id}');event.stopPropagation()"
              ondragstart="scTreeDragStart(event,'${sc.id}')"
              ondragover="scTreeDragOver(event,'${sc.id}')"
              ondragleave="scTreeDragLeave(event,'${sc.id}')"
              ondrop="scTreeDrop(event,'${sc.id}')">
              <span class="tree-child-drag" onclick="event.stopPropagation()">≡</span>
              <span class="tree-dot"></span>
              <span class="tree-status-dot s-${sc.status||'todo'}"></span>
              <span class="tree-child-label">${esc(sc.title||'(無題)')}</span>
            </div>`;
          }).join('')}
        </div>`;
      }
      return `<div class="block-item${isBlkSel?' selected':''}" draggable="true" data-key="${key}"
        ondragstart="blkDragStart(event,'${key}')"
        ondragover="blkDragOver(event,'${key}')"
        ondragleave="blkDragLeave(event,'${key}')"
        ondrop="blkDrop(event,'${key}')">
        <span class="drag-handle">≡</span>
        <span class="block-icon">${d.icon}</span>
        <span class="block-label" onclick="selBlock('${key}');event.stopPropagation()">${d.label}</span>
        ${badge}
        ${scenes.length?chevron:''}
      </div>
      ${childrenHTML}`;
    }

    return `<div class="block-item${isBlkSel?' selected':''}" draggable="true" data-key="${key}"
      onclick="selBlock('${key}')"
      ondragstart="blkDragStart(event,'${key}')"
      ondragover="blkDragOver(event,'${key}')"
      ondragleave="blkDragLeave(event,'${key}')"
      ondrop="blkDrop(event,'${key}')">
      <span class="drag-handle">≡</span>
      <span class="block-icon">${d.icon}</span>
      <span class="block-label">${d.label}</span>
      ${badge}
    </div>`;
  }).join('');

  el.innerHTML = dashHTML + draggableHTML;

  // chevron click handlers
  const ch=document.getElementById('chev-handout');
  if(ch) ch.onclick=e=>{e.stopPropagation();S.treeOpen.handout=!S.treeOpen.handout;renderBlockList();};
  const cn=document.getElementById('chev-honpen');
  if(cn) cn.onclick=e=>{e.stopPropagation();S.treeOpen.honpen=!S.treeOpen.honpen;renderBlockList();};
}

// ── Block drag ──
function blkDragStart(e,k){dragBlk=k;e.dataTransfer.effectAllowed='move';requestAnimationFrame(()=>document.querySelector(`.block-item[data-key="${k}"]`)?.classList.add('dragging'));}
function blkDragOver(e,k){e.preventDefault();if(dragBlk&&dragBlk!==k)document.querySelector(`.block-item[data-key="${k}"]`)?.classList.add('drag-over');}
function blkDragLeave(e,k){document.querySelector(`.block-item[data-key="${k}"]`)?.classList.remove('drag-over');}
function blkDrop(e,k){
  e.preventDefault();document.querySelectorAll('.block-item').forEach(x=>x.classList.remove('drag-over','dragging'));
  if(!dragBlk||dragBlk===k)return;
  const a=S.blockOrder,fi=a.indexOf(dragBlk),ti=a.indexOf(k);
  if(fi<0||ti<0)return;
  a.splice(fi,1);a.splice(ti,0,dragBlk);dragBlk=null;renderBlockList();
}

// ── HO tree drag ──
function hoDragStart(e,id){dragHo=id;e.dataTransfer.effectAllowed='move';e.stopPropagation();}
function hoDragOver(e,id){e.preventDefault();e.stopPropagation();if(dragHo&&dragHo!==id)document.querySelector(`[data-hoid="${id}"]`)?.classList.add('drag-over');}
function hoDragLeave(e,id){e.stopPropagation();document.querySelector(`[data-hoid="${id}"]`)?.classList.remove('drag-over');}
function hoDrop(e,id){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('[data-hoid]').forEach(x=>x.classList.remove('drag-over'));
  if(!dragHo||dragHo===id)return;
  const a=S.blocks.handout.items,fi=a.findIndex(x=>x.id===dragHo),ti=a.findIndex(x=>x.id===id);
  if(fi<0||ti<0)return;
  const[item]=a.splice(fi,1);a.splice(ti,0,item);dragHo=null;renderBlockList();
  if(S.sel.type==='block'&&S.sel.id==='handout')renderEditor();
}

// ── Scene tree drag ──
function scTreeDragStart(e,id){dragSc=id;e.dataTransfer.effectAllowed='move';e.stopPropagation();}
function scTreeDragOver(e,id){e.preventDefault();e.stopPropagation();if(dragSc&&dragSc!==id)document.querySelector(`[data-scid="${id}"]`)?.classList.add('drag-over');}
function scTreeDragLeave(e,id){e.stopPropagation();document.querySelector(`[data-scid="${id}"]`)?.classList.remove('drag-over');}
function scTreeDrop(e,id){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('[data-scid]').forEach(x=>x.classList.remove('drag-over'));
  if(!dragSc||dragSc===id)return;
  const a=S.blocks.honpen.scenes,fi=a.findIndex(x=>x.id===dragSc),ti=a.findIndex(x=>x.id===id);
  if(fi<0||ti<0)return;
  const[item]=a.splice(fi,1);a.splice(ti,0,item);dragSc=null;renderBlockList();
  if(S.sel.type==='block'&&S.sel.id==='honpen')renderEditor();
  else if(S.sel.type==='scene')renderEditor();
}

// ══════════════════════════════════════════
//  NPC LIST
// ══════════════════════════════════════════
let dragNpc=null;
function renderNpcList(){
  const el=document.getElementById('npc-list');
  const kw=(document.getElementById('npc-filter')?.value||'').toLowerCase();
  const list=kw ? S.npcs.filter(n=>(n.name+n.job).toLowerCase().includes(kw)) : S.npcs;
  if(!S.npcs.length){el.innerHTML='<div class="empty-state" style="min-height:70px;"><div class="empty-sub">NPCがいません</div></div>';return;}
  if(!list.length){el.innerHTML='<div class="empty-state" style="min-height:70px;"><div class="empty-sub">該当なし</div></div>';return;}
  el.innerHTML=list.map(n=>{
    const sel=S.sel.type==='npc'&&S.sel.id===n.id;
    return `<div class="entity-card${sel?' selected':''}" draggable="true" data-nid="${n.id}"
      onclick="selNpc('${n.id}')"
      ondragstart="npcDragStart(event,'${n.id}')"
      ondragover="npcDragOver(event,'${n.id}')"
      ondragleave="npcDragLeave(event,'${n.id}')"
      ondrop="npcDrop(event,'${n.id}')">
      <span class="drag-handle">≡</span>
      <div class="entity-info">
        <div class="entity-name">${esc(n.name)}</div>
        <div class="entity-sub">${esc(n.job||'役割未設定')}</div>
      </div>
      <button class="entity-copy" onclick="copyNpc(event,'${n.id}')" title="このNPCを複製">⧉</button>
      <button class="entity-del" onclick="delNpc(event,'${n.id}')">✕</button>
    </div>`;
  }).join('');
}
function npcDragStart(e,id){dragNpc=id;e.dataTransfer.effectAllowed='move';requestAnimationFrame(()=>document.querySelector(`[data-nid="${id}"]`)?.classList.add('dragging'));}
function npcDragOver(e,id){e.preventDefault();if(dragNpc&&dragNpc!==id)document.querySelector(`[data-nid="${id}"]`)?.classList.add('drag-over');}
function npcDragLeave(e,id){document.querySelector(`[data-nid="${id}"]`)?.classList.remove('drag-over');}
function npcDrop(e,id){
  e.preventDefault();document.querySelectorAll('[data-nid]').forEach(x=>x.classList.remove('drag-over','dragging'));
  if(!dragNpc||dragNpc===id)return;
  const a=S.npcs,fi=a.findIndex(x=>x.id===dragNpc),ti=a.findIndex(x=>x.id===id);
  if(fi<0||ti<0)return;
  const[item]=a.splice(fi,1);a.splice(ti,0,item);dragNpc=null;renderNpcList();
}

// ══════════════════════════════════════════
//  INFO LIST
// ══════════════════════════════════════════
let dragInfo=null;
function renderInfoList(){
  const el=document.getElementById('info-list');
  const kw=(document.getElementById('info-filter')?.value||'').toLowerCase();
  const list=kw ? S.infos.filter(x=>(x.name+x.difficulty).toLowerCase().includes(kw)) : S.infos;
  if(!S.infos.length){el.innerHTML='<div class="empty-state" style="min-height:70px;"><div class="empty-sub">情報がありません</div></div>';return;}
  if(!list.length){el.innerHTML='<div class="empty-state" style="min-height:70px;"><div class="empty-sub">該当なし</div></div>';return;}
  el.innerHTML=list.map(inf=>{
    const sel=S.sel.type==='info'&&S.sel.id===inf.id;
    return `<div class="entity-card${sel?' selected':''}" draggable="true" data-iid="${inf.id}"
      onclick="selInfo('${inf.id}')"
      ondragstart="infoDragStart(event,'${inf.id}')"
      ondragover="infoDragOver(event,'${inf.id}')"
      ondragleave="infoDragLeave(event,'${inf.id}')"
      ondrop="infoDrop(event,'${inf.id}')">
      <span class="drag-handle">≡</span>
      <div class="entity-info">
        <div class="entity-name">${esc(inf.name)}</div>
        <div class="entity-sub">${esc(inf.difficulty||'難易度未設定')}</div>
      </div>
      <button class="entity-del" onclick="delInfo(event,'${inf.id}')">✕</button>
    </div>`;
  }).join('');
}
function infoDragStart(e,id){dragInfo=id;e.dataTransfer.effectAllowed='move';requestAnimationFrame(()=>document.querySelector(`[data-iid="${id}"]`)?.classList.add('dragging'));}
function infoDragOver(e,id){e.preventDefault();if(dragInfo&&dragInfo!==id)document.querySelector(`[data-iid="${id}"]`)?.classList.add('drag-over');}
function infoDragLeave(e,id){document.querySelector(`[data-iid="${id}"]`)?.classList.remove('drag-over');}
function infoDrop(e,id){
  e.preventDefault();document.querySelectorAll('[data-iid]').forEach(x=>x.classList.remove('drag-over','dragging'));
  if(!dragInfo||dragInfo===id)return;
  const a=S.infos,fi=a.findIndex(x=>x.id===dragInfo),ti=a.findIndex(x=>x.id===id);
  if(fi<0||ti<0)return;
  const[item]=a.splice(fi,1);a.splice(ti,0,item);dragInfo=null;renderInfoList();
}

// ══════════════════════════════════════════
//  SELECT
// ══════════════════════════════════════════
function selBlock(key){S.sel={type:'block',id:key};renderBlockList();renderEditor();}
function selHo(id){S.sel={type:'ho',id};renderBlockList();renderEditor();switchTab('blocks');}
function selScene(id){S.sel={type:'scene',id};renderBlockList();renderEditor();switchTab('blocks');}
function selNpc(id){S.sel={type:'npc',id};renderNpcList();renderEditor();switchTab('npcs');}
function selInfo(id){S.sel={type:'info',id};renderInfoList();renderEditor();switchTab('info');}

// ══════════════════════════════════════════
//  RENDER EDITOR
// ══════════════════════════════════════════
function renderEditor(){
  const tEl=document.getElementById('editor-title');
  const bEl=document.getElementById('editor-badge');
  const cEl=document.getElementById('editor-content');
  const t=S.sel.type,id=S.sel.id;

  if(t==='npc'){renderNpcEditor(id,tEl,bEl,cEl);return;}
  if(t==='info'){renderInfoEditor(id,tEl,bEl,cEl);return;}
  if(t==='ho'){renderSingleHoEditor(id,tEl,bEl,cEl);return;}
  if(t==='scene'){renderSingleSceneEditor(id,tEl,bEl,cEl);return;}
  if(!id){
    tEl.textContent='ブロックを選択...';bEl.textContent='';
    cEl.innerHTML=`<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-title">ブロックを選択してください</div><div class="empty-sub">左サイドバーから編集したい項目をクリック</div></div>`;
    return;
  }
  if(id==='dashboard'){renderDashboardEditor(tEl,bEl,cEl);return;}
  const def=BLOCK_DEFS.find(d=>d.key===id);
  tEl.textContent=def.label;
  bEl.textContent=def.badge?`[${def.badge.toUpperCase()}]`:'';
  if(id==='handout'){renderHandoutEditor(cEl);return;}
  if(id==='honpen'){renderHonpenEditor(cEl);return;}
  renderSimpleEditor(id,cEl);
}

// ── DASHBOARD EDITOR ──
function renderDashboardEditor(tEl,bEl,cEl){
  tEl.textContent='ダッシュボード';bEl.textContent='[INFO]';
  const d=S.blocks.dashboard;
  cEl.innerHTML=`
  <div class="section-card">
    <div class="section-header" style="color:var(--accent);">🗂 シナリオ情報</div>
    <div class="section-body">
      <div class="field-group" style="margin-bottom:4px;">
        <label class="field-label">シナリオ名</label>
        <input class="field-input" style="font-size:1.05rem;font-weight:600;" value="${esc(S.scenarioName)}"
          oninput="updScenarioName(this.value)">
      </div>
    </div>
  </div>
  <div class="section-card">
    <div class="section-header">基本情報</div>
    <div class="section-body">
      <div class="grid2">
        <div class="field-group"><label class="field-label">システム</label>
          <input class="field-input" value="${esc(d.system)}" placeholder="例: クトゥルフ神話TRPG" oninput="updDashboard('system',this.value)">
        </div>
        <div class="field-group"><label class="field-label">推奨参加人数</label>
          <input class="field-input" value="${esc(d.players)}" placeholder="例: 3〜4人" oninput="updDashboard('players',this.value)">
        </div>
      </div>
      <div class="grid2">
        <div class="field-group"><label class="field-label">キャラクターレベル</label>
          <input class="field-input" value="${esc(d.level)}" placeholder="例: 初期作成" oninput="updDashboard('level',this.value)">
        </div>
        <div class="field-group"><label class="field-label">プレイ時間</label>
          <input class="field-input" value="${esc(d.playtime)}" placeholder="例: 4〜6時間" oninput="updDashboard('playtime',this.value)">
        </div>

function sceneCardHTML(sc,i){
  const npcTags=(sc.npcIds||[]).map(id=>{

    if(!n) return '';

      onmouseleave="scheduleHidePopup()"
      ontouchstart="showNpcPopup(event,'${n.id}')">${esc(n.name)}<span class="tag-x" onclick="removeSceneNpc('${sc.id}','${id}')">×</span></span>`;
  }).join('');
  const npcOpts=S.npcs.filter(n=>!(sc.npcIds||[]).includes(n.id)).map(n=>`<option value="${n.id}">${esc(n.name)}</option>`).join('');
  const ibHTML=(sc.inlineBlocks||[]).map(ib=>ibHTML_f(sc.id,ib)).join('');
  const status=sc.status||'todo';
  const statusLabels={todo:'未着手',wip:'執筆中',done:'完成'};
  const statusIcons={todo:'○',wip:'◎',done:'✓'};
  const collapsed=sc.collapsed||false;
  return `<div class="scene-card" id="sc-${sc.id}" data-scid="${sc.id}"
    ondragover="scEditorDragOver(event,'${sc.id}')"
    ondragleave="scEditorDragLeave(event,'${sc.id}')"
    ondrop="scEditorDrop(event,'${sc.id}')">
    <div class="scene-card-header">
      <span class="drag-handle" draggable="true"
        ondragstart="scEditorDragStart(event,'${sc.id}')" title="ドラッグで並び替え">≡</span>
      <span class="scene-num">SCENE ${String(i+1).padStart(2,'0')}</span>
      <input class="scene-title-input" value="${esc(sc.title)}" placeholder="シーン名"
        oninput="updScene('${sc.id}','title',this.value);syncScTree('${sc.id}',this.value)">
      <span class="scene-status s-${status}" onclick="cycleSceneStatus('${sc.id}')" title="クリックでステータス変更">${statusIcons[status]} ${statusLabels[status]}</span>
      <button class="scene-collapse-btn" onclick="toggleSceneCollapse('${sc.id}')" title="${collapsed?'展開':'折りたたむ'}">${collapsed?'▶':'▼'}</button>
      <button class="scene-del" onclick="delScene('${sc.id}')">✕</button>
    </div>
    <div class="scene-body${collapsed?' collapsed':''}">
      <div class="grid2">
        <div class="field-group"><label class="field-label">場所</label>
          <input class="field-input" value="${esc(sc.location||'')}" placeholder="場所名を入力" oninput="updScene('${sc.id}','location',this.value)">
        </div>
        <div class="field-group"><label class="field-label">目的</label>
          <input class="field-input" value="${esc(sc.goal)}" placeholder="このシーンの目的" oninput="updScene('${sc.id}','goal',this.value)">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">登場NPC</label>
        <div class="tag-list" style="margin-bottom:5px;" id="npc-tags-${sc.id}">${npcTags}</div>
        <select class="field-select" style="width:auto;font-size:.83rem;" onchange="addSceneNpc('${sc.id}',this.value);this.value=''">
          <option value="">＋ NPCを追加...</option>${npcOpts}
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">本文</label>
        <div class="inline-editor" id="ie-${sc.id}">${ibHTML}</div>
        <div class="inline-add-bar">
          <button class="btn btn-sm" onclick="addIB('${sc.id}','text')">＋ 本文</button>
          <button class="btn btn-sm" onclick="addIB('${sc.id}','desc')">＋ 描写</button>
          <button class="btn btn-sm" onclick="addIB('${sc.id}','serif')">＋ セリフ</button>

function ibHTML_f(scId,ib){
  // 資料（画像）ブロック
  if(ib.type==='image'){
    const imgContent = ib.image
      ? `<div class="ib-image-preview">
           <img src="${escImg(ib.image)}" alt="${esc(ib.caption||'')}">
           <span class="ib-image-del-img" onclick="clearIBImage('${scId}','${ib.id}')">✕ 画像を削除</span>
           <input class="ib-image-caption" placeholder="キャプション（任意）" value="${esc(ib.caption||'')}"
             oninput="updIBCaption('${scId}','${ib.id}',this.value)">
         </div>`
      : `<div class="ib-image-upload-area" onclick="triggerIBImageUpload('${scId}','${ib.id}')">
           <span style="font-size:1.6rem;">🖼</span>クリックして画像を追加
         </div>`;
    return `<div class="ib ib-image" id="ib-${ib.id}" data-ibid="${ib.id}" draggable="true"
      ondragstart="ibDragStart(event,'${scId}','${ib.id}')"
      ondragover="ibDragOver(event,'${scId}','${ib.id}')"
      ondrop="ibDrop(event,'${scId}','${ib.id}')">
      <input type="file" id="ib-img-input-${ib.id}" accept="image/*" style="display:none" onchange="loadIBImage(event,'${scId}','${ib.id}')">
      <div class="ib-top">
        <span class="ib-drag">≡</span>
        <span class="ib-type-label">資料</span>
        ${ib.image?'':`<span style="font-size:.74rem;color:var(--text-muted);">画像をクリックして追加</span>`}
        <button class="ib-del" onclick="delIB('${scId}','${ib.id}')">✕</button>
      </div>
      ${imgContent}
    </div>`;
  }

  const labels={text:'本文',desc:'描写',serif:'セリフ'};
  const cls=ib.type==='desc'?'ib-desc':ib.type==='serif'?'ib-serif':'';
  const taClass=`auto-ta${ib.type==='serif'?' italic':''}`;
  const ph=ib.type==='desc'?'情景描写を入力...':ib.type==='serif'?'「セリフを入力...」':'本文を入力...';

  // セリフブロックのみ：話者プルダウン
  let speakerHTML = '';
  if(ib.type==='serif'){
    const sc=S.blocks.honpen.scenes.find(x=>x.id===scId);
    const speakerNpcs=sc?(sc.npcIds||[]).map(id=>S.npcs.find(x=>x.id===id)).filter(Boolean):[];
    const opts=speakerNpcs.map(n=>`<option value="${n.id}"${ib.speakerId===n.id?' selected':''}>${esc(n.name)}</option>`).join('');
    speakerHTML=`<select class="ib-speaker-select" onchange="updIBSpeaker('${scId}','${ib.id}',this.value)" title="話者を選択">
      <option value="">— 話者 —</option>${opts}
    </select>`;
  }

  return `<div class="ib ${cls}" id="ib-${ib.id}" data-ibid="${ib.id}" draggable="true"
    ondragstart="ibDragStart(event,'${scId}','${ib.id}')"
    ondragover="ibDragOver(event,'${scId}','${ib.id}')"
    ondrop="ibDrop(event,'${scId}','${ib.id}')">
    <div class="ib-top">
      <span class="ib-drag">≡</span>
      <span class="ib-type-label">${labels[ib.type]}</span>
      ${speakerHTML}
      <button class="ib-del" onclick="delIB('${scId}','${ib.id}')">✕</button>
    </div>
    ${(()=>{
      if(ib.type==='serif' && ib.speakerId){
        const spkN=S.npcs.find(x=>x.id===ib.speakerId);
        return spkN?`<div class="ib-speaker-name">${esc(spkN.name)}</div>`:'';
      }
      return '';
    })()}
    <textarea class="${taClass}" rows="2" placeholder="${ph}"
      oninput="updIB('${scId}','${ib.id}',this.value)">${esc(ib.content)}</textarea>
  </div>`;
}

// ══════════════════════════════════════════
function updHo(id,f,v){const ho=S.blocks.handout.items.find(x=>x.id===id);if(ho)ho[f]=v;}
function updScene(id,f,v){const sc=S.blocks.honpen.scenes.find(x=>x.id===id);if(sc)sc[f]=v;}
function updIB(scId,ibId,v){const sc=S.blocks.honpen.scenes.find(x=>x.id===scId);if(!sc)return;const ib=sc.inlineBlocks.find(x=>x.id===ibId);if(ib)ib.content=v;}
function updNpc(id,f,v){const n=S.npcs.find(x=>x.id===id);if(n)n[f]=v;}
function updInfo(id,f,v){const inf=S.infos.find(x=>x.id===id);if(inf)inf[f]=v;}
// ダッシュボード・シンプルブロック用（oninput属性はグローバルスコープで実行されるためS.xxxを直接参照できない）
function updDashboard(f,v){S.blocks.dashboard[f]=v;}
function updScenarioName(v){S.scenarioName=v;const ht=document.getElementById('header-scenario-title');if(ht)ht.textContent=v||'新しいシナリオ';}
function updSimpleBlock(key,v){S.blocks[key].content=v;}

function addHandout(){
  const ho={id:uid(),name:'',connection:'',condition:'',body:'',goal:''};
  S.blocks.handout.items.push(ho);
  S.treeOpen.handout=true;
  markDirty();

  const cEl=document.getElementById('editor-content');
  const isHandoutView = S.sel.type==='block' && S.sel.id==='handout';
  if(isHandoutView && cEl){
    const i=S.blocks.handout.items.length-1;
    cEl.querySelector('.empty-state')?.remove();
    // 全HO印刷ボタンが未表示なら追加
    const allPrintBtn=cEl.querySelector('.ho-print-btn[onclick="printAllHandouts()"]');
    if(!allPrintBtn){
      const hdr=cEl.querySelector('.honpen-header div');
      if(hdr) hdr.insertAdjacentHTML('afterbegin',`<span class="ho-print-btn" onclick="printAllHandouts()" title="全HOを一括印刷">🖨 全HO印刷</span>`);
    }
    cEl.insertAdjacentHTML('beforeend', hoCardHTML(ho,i));
    initAR(cEl);
    renderBlockList();
    setTimeout(()=>{ cEl.scrollTop=cEl.scrollHeight; },60);
  } else {
    renderBlockList();renderEditor();
  }
}
function delHandout(id){
  const ho=S.blocks.handout.items.find(x=>x.id===id);
  const name=ho&&ho.name?`「${ho.name}」`:'このハンドアウト';
  confirmModal(`${name} を削除しますか？\nこの操作は元に戻せません。`, ()=>{
    const idx=S.blocks.handout.items.findIndex(x=>x.id===id);

// シーンカード内のNPCタグ部分だけ再描画するヘルパー
function _refreshSceneNpcArea(scId){
  const sc=S.blocks.honpen.scenes.find(x=>x.id===scId);if(!sc)return;
  const tagsEl=document.getElementById('npc-tags-'+scId);
  const card=document.getElementById('sc-'+scId);
  if(!tagsEl||!card)return;
  // タグリスト更新
  const npcTags=(sc.npcIds||[]).map(id=>{
    const n=S.npcs.find(x=>x.id===id);if(!n)return'';
    return `<span class="tag tag-npc-hover" data-npcid="${n.id}"
      onmouseenter="showNpcPopup(event,'${n.id}')"
      onmouseleave="scheduleHidePopup()"
      ontouchstart="showNpcPopup(event,'${n.id}')">${esc(n.name)}<span class="tag-x" onclick="removeSceneNpc('${scId}','${id}')">×</span></span>`;
  }).join('');
  tagsEl.innerHTML=npcTags;
  // selectの選択肢更新（選択済みNPCを候補から除外）
  const sel=card.querySelector(`select[onchange*="addSceneNpc('${scId}"]`);
  if(sel){
    const npcOpts=S.npcs.filter(n=>!(sc.npcIds||[]).includes(n.id)).map(n=>`<option value="${n.id}">${esc(n.name)}</option>`).join('');
    sel.innerHTML=`<option value="">＋ NPCを追加...</option>${npcOpts}`;
    sel.value='';
  }

function loadNpcImage(e, npcId){

  if(file.size>2*1024*1024){toast('⚠ 画像が大きすぎます（2MB以下にしてください）');e.target.value='';return;}
  const reader=new FileReader();
  reader.onload=ev=>{

    n.image=ev.target.result;
    // 画像ボックスを更新（全体再描画せず）

    if(box){
      box.innerHTML=`<div class="npc-image-box" onclick="triggerNpcImageUpload('${npcId}')"><img src="${escImg(n.image)}" alt="NPC画像"></div>
        <div class="npc-image-actions">

          <span class="npc-img-btn danger" onclick="clearNpcImage('${npcId}')">削除</span>
        </div>`;
    }
    markDirty();toast('画像を設定しました','ok');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

let dragScEd=null;
function scEditorDragStart(e,id){dragScEd=id;e.dataTransfer.effectAllowed='move';e.stopPropagation();requestAnimationFrame(()=>document.getElementById('sc-'+id)?.classList.add('dragging'));}
function scEditorDragOver(e,id){e.preventDefault();if(dragScEd&&dragScEd!==id)document.getElementById('sc-'+id)?.classList.add('drag-over');}

// ── NPC ポップアップ ──
let _popupHideTimer = null;
let _popupNpcId = null;

function showNpcPopup(e, npcId){
  clearTimeout(_popupHideTimer);
  const n = S.npcs.find(x => x.id === npcId);
  if(!n) return;
  _popupNpcId = npcId;

  const popup = document.getElementById('npc-popup');

  // タッチデバイスでは既に表示中なら閉じる（トグル）
  if(ENV.isTouchDevice && popup.classList.contains('show') && _popupNpcId === npcId){
    popup.classList.remove('show');
    return;
  }

  // 名前・陣営
  document.getElementById('popup-name').textContent = n.name || '(名前未設定)';
  const fEl = document.getElementById('popup-faction');
  fEl.textContent = n.faction || '';
  fEl.className = 'popup-faction';
  if(n.faction==='味方') fEl.classList.add('f-ally');
  else if(n.faction==='敵対') fEl.classList.add('f-enemy');
  else if(n.faction==='中立') fEl.classList.add('f-neutral');

  // ボディ
  const rows = [];
  if(n.age||n.job) rows.push(['役割・年齢', [n.job,n.age].filter(Boolean).join('／')]);
  if(n.appearance) rows.push(['外見・特徴', n.appearance]);
  if(n.body)       rows.push(['背景・動機', n.body.length>120 ? n.body.slice(0,120)+'…' : n.body]);
  if(n.roleplay)   rows.push(['ロールプレイ', n.roleplay.length>100 ? n.roleplay.slice(0,100)+'…' : n.roleplay]);

  document.getElementById('popup-body').innerHTML = rows.length
    ? rows.map(([l,v])=>`<div class="popup-row"><span class="popup-label">${esc(l)}</span><span class="popup-value">${esc(v)}</span></div>`).join('')
    : `<div style="color:var(--text-muted);font-size:.84rem;">詳細情報はまだ登録されていません</div>`;

  // 位置計算
  const rect = e.currentTarget.getBoundingClientRect();
  const pw = 280, ph_approx = 280;
  let left = rect.left;
  let top  = rect.bottom + 8;
  if(left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
  if(left < 12) left = 12;
  if(top + ph_approx > window.innerHeight - 12) top = rect.top - ph_approx - 8;
  if(top < 60) top = 60;
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';

  popup.classList.add('show');

  if(ENV.isTouchDevice){
    // タッチデバイス: ポップアップ外タップで閉じる
    setTimeout(()=>{
      const closeOnOutside=(ev)=>{
        if(!popup.contains(ev.target)){ popup.classList.remove('show'); document.removeEventListener('touchstart',closeOnOutside); }
      };
      document.addEventListener('touchstart', closeOnOutside, {once:false, passive:true});
    }, 100);
  } else {
    popup.onmouseenter = ()=> clearTimeout(_popupHideTimer);
    popup.onmouseleave = ()=> scheduleHidePopup();
  }
}

function scheduleHidePopup(){
  _popupHideTimer = setTimeout(()=>{
    document.getElementById('npc-popup').classList.remove('show');
  }, 220);
}

function jumpToNpcFromPopup(){
  if(_popupNpcId){
    document.getElementById('npc-popup').classList.remove('show');
    selNpc(_popupNpcId);
  }
}

// ── 確認ダイアログ（confirm() 代替）──
// onOk: 確認OKの時だけ呼ばれるコールバック
function confirmModal(message, onOk, okLabel='削除する', dangerStyle=true){
  document.getElementById('modal-title').textContent = '確認';
  document.getElementById('modal-body').innerHTML =

function openSaveModal(){
  // 環境別のヒントメッセージ
  let hint = '';
  if(ENV.hasFilePicker){
    if(ENV.isAndroid){
      hint = '📁 保存先フォルダを選べます。DropboxやGoogle Driveなどのクラウドフォルダも選択できます。';
    } else {
      hint = '保存先を選ぶダイアログが開きます。';
    }
  } else if(ENV.isIOS){
    hint = `📱 iOS では自動的にダウンロードされます。\n保存後、ファイルアプリで「ダウンロード」フォルダを開き、iCloud Drive や Google Drive などのフォルダへ移動してください。\n\n次回同じファイルを読み込む際は「📂 読込」から選択してください。`;
  } else {
    hint = '※ このブラウザはネイティブ保存ダイアログ非対応のため、ダウンロードフォルダへ保存されます。ブラウザの設定で「ダウンロード前に保存先を確認する」を有効にすると保存先を指定できます。';
  }

  openModal('保存',`
    <div class="save-row">
      <div class="field-group">
        <label class="field-label">シナリオ名</label>
        <input class="field-input" id="save-name" value="${esc(S.scenarioName)}" placeholder="シナリオ名">
      </div>
      <div class="field-group">
        <label class="field-label">ファイル名</label>
        <div class="save-filename">
          <input class="field-input" id="save-fname" value="${esc(safeFilename(S.scenarioName))}" placeholder="ファイル名">
          <span>.trpg.json</span>
        </div>
        <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;">
          <button class="btn btn-sm" type="button" id="save-stamp-btn" title="日付・時刻をファイル名末尾に付加">📅 日時を付ける</button>
          <span style="font-size:.75rem;color:var(--text-muted);align-self:center;">バージョン管理に</span>
        </div>
      </div>
      <p style="font-size:.8rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;">${esc(hint)}</p>
    </div>`,
  '保存する', async ()=>{
    const sname = document.getElementById('save-name').value.trim() || '新しいシナリオ';
    const fname = document.getElementById('save-fname').value.trim() || safeFilename(sname);
    S.scenarioName = sname;
    const json = JSON.stringify({S, _id}, null, 2);

    // サイズ警告チェック
    const sizeWarn = _checkSaveSize(json);
    const doSave = async ()=>{
      closeModal();
      if(ENV.hasFilePicker){
        try{
          const fh = await window.showSaveFilePicker({
            suggestedName: fname + '.trpg.json',
            types:[{description:'TRPG Scenario',accept:{'application/json':['.trpg.json','.json']}}],
            excludeAcceptAllOption: false,
          });
          const writable = await fh.createWritable();
          await writable.write(json);
          await writable.close();
          setFileHandle(fh);
          localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
          localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
          markClean();
          toast('保存しました','ok');
        }catch(e){
          if(e.name!=='AbortError') toast('保存に失敗しました: '+e.message);
        }
      } else {
        // iOS / fallback: ダウンロード方式
        const blob = new Blob([json],{type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname + '.trpg.json';
        document.body.appendChild(a); a.click();
        setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
        localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
        markClean();
        if(ENV.isIOS){
          setTimeout(()=>toast('ファイルアプリでクラウドへ移動してください','ok'), 600);
        } else {
          toast('保存しました（ダウンロードフォルダへ）','ok');
        }
      }
    };
    if(sizeWarn){
      confirmModal(sizeWarn, doSave, 'このまま保存', false);
    } else {
      await doSave();
    }
  });
  setTimeout(()=>{
    const sn=document.getElementById('save-name');
    const fn=document.getElementById('save-fname');

    // 日時スタンプボタン
    const stampBtn=document.getElementById('save-stamp-btn');
    if(stampBtn) stampBtn.addEventListener('click',()=>{
      const base=safeFilename(fn.value.replace(/_\d{8}_\d{4}$/,''));
      const now=new Date();
      const ymd=[now.getFullYear(),String(now.getMonth()+1).padStart(2,'0'),String(now.getDate()).padStart(2,'0')].join('');
      const hm=[String(now.getHours()).padStart(2,'0'),String(now.getMinutes()).padStart(2,'0')].join('');
      fn.value=`${base}_${ymd}_${hm}`;
    });
  },100);
}

function safeFilename(s){return(s||'scenario').replace(/[\\/:*?"<>|]/g,'_').trim()||'scenario';}

// ── 保存前サイズ警告 ──
function _checkSaveSize(json){
  const bytes = new Blob([json]).size;
  const mb = bytes / (1024*1024);
  if(mb > 20){
    return `⚠️ 保存ファイルが ${mb.toFixed(1)}MB あります。\n`
         + `画像を多数埋め込んでいる場合、読み込みが遅くなる可能性があります。\n\n`
         + `このまま保存しますか？`;
  }
  return null;
}

// ──────────────────────────────────────────
//  上書き保存
// ──────────────────────────────────────────
async function overwriteSave(){
  const json = JSON.stringify({S, _id}, null, 2);

  // サイズ警告チェック
  const sizeWarn = _checkSaveSize(json);
  const doOverwrite = async ()=>{
    // File System Access API が使える環境（Android Chrome / PC Chrome・Edge）
    if(ENV.hasFilePicker && _currentFileHandle){
      try{
        const writable = await _currentFileHandle.createWritable();
        await writable.write(json);
        await writable.close();
        saveSnapshot(); // 上書き成功 → スナップショット保存
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
        localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
        markClean();
        toast('上書き保存しました','ok');
      }catch(e){
        if(e.name==='AbortError') return;
        setFileHandle(null);
        toast('上書きに失敗しました。「保存」で保存先を再指定してください。');
      }
      return;
    }

    // iOS / filePicker非対応: 即ダウンロードして案内
    if(!_currentFileHandle && !ENV.hasFilePicker){
      const fname = safeFilename(S.scenarioName);
      const blob = new Blob([json],{type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname + '.trpg.json';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
      saveSnapshot(); // 上書き成功 → スナップショット保存
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
      localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
      markClean();
      if(ENV.isIOS){
        setTimeout(()=>toast('ファイルアプリでクラウドへ移動してください','ok'), 600);
      } else {
        toast('保存しました（ダウンロードフォルダへ）','ok');
      }
      return;
    }

    // filePicker対応だがハンドル未設定
    toast('上書き先ファイルがありません。先に「保存」してください。');
  };

  if(sizeWarn){
    confirmModal(sizeWarn, doOverwrite, 'このまま保存', false);
  } else {
    await doOverwrite();
  }
}
