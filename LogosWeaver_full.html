function openSaveModal(){
  // 環境別のヒントメッセージ
  let hint = '';
  if(ENV.hasFilePicker){
    if(ENV.isAndroid){
      hint = '📁 保存先フォルダを選べます。DropboxやGoogle Driveなどのクラウドフォルダも選択できます。';
    } else {
      hint = '保存先を選ぶダイアログが開きます。';
    }
  } else if(ENV.isIOS){
    hint = `📱 iOS では自動的にダウンロードされます。\n保存後、ファイルアプリで「ダウンロード」フォルダを開き、iCloud Drive や Google Drive などのフォルダへ移動してください。\n\n次回同じファイルを読み込む際は「📂 読込」から選択してください。`;
  } else {
    hint = '※ このブラウザはネイティブ保存ダイアログ非対応のため、ダウンロードフォルダへ保存されます。ブラウザの設定で「ダウンロード前に保存先を確認する」を有効にすると保存先を指定できます。';
  }

  openModal('保存',`
    <div class="save-row">
      <div class="field-group">
        <label class="field-label">シナリオ名</label>
        <input class="field-input" id="save-name" value="${esc(S.scenarioName)}" placeholder="シナリオ名">
      </div>
      <div class="field-group">
        <label class="field-label">ファイル名</label>
        <div class="save-filename">
          <input class="field-input" id="save-fname" value="${esc(safeFilename(S.scenarioName))}" placeholder="ファイル名">
          <span>.trpg.json</span>
        </div>
        <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;">
          <button class="btn btn-sm" type="button" id="save-stamp-btn" title="日付・時刻をファイル名末尾に付加">📅 日時を付ける</button>
          <span style="font-size:.75rem;color:var(--text-muted);align-self:center;">バージョン管理に</span>
        </div>
      </div>
      <p style="font-size:.8rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;">${esc(hint)}</p>
    </div>`,
  '保存する', async ()=>{
    const sname = document.getElementById('save-name').value.trim() || '新しいシナリオ';
    const fname = document.getElementById('save-fname').value.trim() || safeFilename(sname);
    S.scenarioName = sname;
    const json = JSON.stringify({S, _id}, null, 2);

    // サイズ警告チェック
    const sizeWarn = _checkSaveSize(json);
    const doSave = async ()=>{
      closeModal();
      if(ENV.hasFilePicker){
        try{
          const fh = await window.showSaveFilePicker({
            suggestedName: fname + '.trpg.json',
            types:[{description:'TRPG Scenario',accept:{'application/json':['.trpg.json','.json']}}],
            excludeAcceptAllOption: false,
          });
          const writable = await fh.createWritable();
          await writable.write(json);
          await writable.close();
          setFileHandle(fh);
          localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
          localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
          markClean();
          toast('保存しました','ok');
        }catch(e){
          if(e.name!=='AbortError') toast('保存に失敗しました: '+e.message);
        }
      } else {
        // iOS / fallback: ダウンロード方式
        const blob = new Blob([json],{type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname + '.trpg.json';
        document.body.appendChild(a); a.click();
        setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
        localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
        markClean();
        if(ENV.isIOS){
          setTimeout(()=>toast('ファイルアプリでクラウドへ移動してください','ok'), 600);
        } else {
          toast('保存しました（ダウンロードフォルダへ）','ok');
        }
      }
    };
    if(sizeWarn){
      confirmModal(sizeWarn, doSave, 'このまま保存', false);
    } else {
      await doSave();
    }
  });
  setTimeout(()=>{
    const sn=document.getElementById('save-name');
    const fn=document.getElementById('save-fname');
    if(sn&&fn) sn.addEventListener('input',()=>{ fn.value=safeFilename(sn.value); });
    // 日時スタンプボタン
    const stampBtn=document.getElementById('save-stamp-btn');
    if(stampBtn) stampBtn.addEventListener('click',()=>{
      const base=safeFilename(fn.value.replace(/_\d{8}_\d{4}$/,''));
      const now=new Date();
      const ymd=[now.getFullYear(),String(now.getMonth()+1).padStart(2,'0'),String(now.getDate()).padStart(2,'0')].join('');
      const hm=[String(now.getHours()).padStart(2,'0'),String(now.getMinutes()).padStart(2,'0')].join('');
      fn.value=`${base}_${ymd}_${hm}`;
    });
  },100);
}

function safeFilename(s){return(s||'scenario').replace(/[\\/:*?"<>|]/g,'_').trim()||'scenario';}

// ── 保存前サイズ警告 ──
function _checkSaveSize(json){
  const bytes = new Blob([json]).size;
  const mb = bytes / (1024*1024);
  if(mb > 20){
    return `⚠️ 保存ファイルが ${mb.toFixed(1)}MB あります。\n`
         + `画像を多数埋め込んでいる場合、読み込みが遅くなる可能性があります。\n\n`
         + `このまま保存しますか？`;
  }
  return null;
}

// ──────────────────────────────────────────
//  上書き保存
// ──────────────────────────────────────────
async function overwriteSave(){
  const json = JSON.stringify({S, _id}, null, 2);

  // サイズ警告チェック
  const sizeWarn = _checkSaveSize(json);
  const doOverwrite = async ()=>{
    // File System Access API が使える環境（Android Chrome / PC Chrome・Edge）
    if(ENV.hasFilePicker && _currentFileHandle){
      try{
        const writable = await _currentFileHandle.createWritable();
        await writable.write(json);
        await writable.close();
        saveSnapshot(); // 上書き成功 → スナップショット保存
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
        localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
        markClean();
        toast('上書き保存しました','ok');
      }catch(e){
        if(e.name==='AbortError') return;
        setFileHandle(null);
        toast('上書きに失敗しました。「保存」で保存先を再指定してください。');
      }
      return;
    }

    // iOS / filePicker非対応: 即ダウンロードして案内
    if(!_currentFileHandle && !ENV.hasFilePicker){
      const fname = safeFilename(S.scenarioName);
      const blob = new Blob([json],{type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname + '.trpg.json';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
      saveSnapshot(); // 上書き成功 → スナップショット保存
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
      localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
      markClean();
      if(ENV.isIOS){
        setTimeout(()=>toast('ファイルアプリでクラウドへ移動してください','ok'), 600);
      } else {
        toast('保存しました（ダウンロードフォルダへ）','ok');
      }
      return;
    }

    // filePicker対応だがハンドル未設定
    toast('上書き先ファイルがありません。先に「保存」してください。');
  };

  if(sizeWarn){
    confirmModal(sizeWarn, doOverwrite, 'このまま保存', false);
  } else {
    await doOverwrite();
  }
}

        <input type="radio" class="export-radio" name="expfmt" value="md" checked>

          <div class="export-opt-name">テキスト</div>
          <div class="export-opt-desc">プレーンテキスト (.txt)</div>

          <div class="export-opt-name">PDF</div>
          <div class="export-opt-desc">印刷プレビューから保存先を選択 (.pdf)</div>
        </div>
      </label>

      </div>
    </div>
    <p style="font-size:.8rem;color:var(--text-muted);line-height:1.5;" id="exp-hint">${hint}</p>`,
  'エクスポート', async ()=>{
    const fmt = document.querySelector('input[name="expfmt"]:checked')?.value || 'md';
    const fname = document.getElementById('exp-fname').value.trim() || safeFilename(S.scenarioName);
    closeModal();
    if(fmt === 'pdf'){ exportPDF(); return; }

    const isMd = fmt === 'md';
    const content = isMd ? buildMarkdown() : buildPlainText();
    const mime = isMd ? 'text/markdown' : 'text/plain';
    const ext = isMd ? '.md' : '.txt';

    if(typeof window.showSaveFilePicker === 'function'){
      try{
        const fh = await window.showSaveFilePicker({
          suggestedName: fname + ext,
          types:[{description: isMd?'Markdown':'Text', accept:{[mime]:[ext]}}],
          excludeAcceptAllOption: false,
        });
        const writable = await fh.createWritable();
        await writable.write(content);
        await writable.close();
        toast('エクスポートしました','ok');
      }catch(e){
        if(e.name!=='AbortError') toast('エクスポートに失敗しました: '+e.message);
      }
    } else {
      downloadFallback(content, fname+ext, mime);
    }
  });

  // radio style & ext sync
  setTimeout(()=>{
    document.querySelectorAll('input[name="expfmt"]').forEach(r=>{
      r.addEventListener('change',()=>{
        document.querySelectorAll('.export-opt').forEach(o=>o.classList.remove('selected'));
        r.closest('.export-opt').classList.add('selected');
        const extMap={md:'.md',txt:'.txt',pdf:'.pdf'};
        document.getElementById('exp-ext').textContent = extMap[r.value];
        // PDF選択時はファイル名行を隠す（印刷ダイアログで指定）
        document.getElementById('exp-fname-row').style.display = r.value==='pdf'?'none':'';
      });
    });
  },80);
}

function downloadFallback(content, filename, mime){
  const blob = new Blob([content],{type: mime+';charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('エクスポートしました','ok');
}

function buildScenarioText(fmt){
  const md=fmt==='md';
  const h1=s=>md?`# ${s}\n`:`${'═'.repeat(60)}\n${s}\n${'═'.repeat(60)}\n`;
  const h2=s=>md?`## ${s}\n`:`\n━━━ ${s} ━━━\n`;
  const h3=s=>md?`### ${s}\n`:`\n── ${s} ──\n`;
  const label=(k,v)=>v?`${md?`**${k}**: `:`【${k}】`}${v}\n`:'';
  const hr=()=>md?`\n---\n`:`\n${'─'.repeat(40)}\n`;
  let out='';

  out+=h1(S.scenarioName||'TRPG シナリオ');
  out+='\n';

  // ダッシュボード（シナリオ情報）
  const db=S.blocks.dashboard;
  const dbFields=[
    ['システム',db.system],['推奨参加人数',db.players],
    ['キャラクターレベル',db.level],['プレイ時間',db.playtime],
  ].filter(([,v])=>v);
  if(dbFields.length||db.regulation||db.preview){
    if(md){
      if(dbFields.length){
        out+='| 項目 | 内容 |\n|---|---|\n';
        dbFields.forEach(([k,v])=>{out+=`| ${k} | ${v} |\n`;});
        out+='\n';
      }
      if(db.regulation)out+=`${h3('レギュレーション')}${db.regulation}\n\n`;
      if(db.preview)out+=`${h3('今回予告')}${db.preview}\n\n`;
    } else {
      dbFields.forEach(([k,v])=>{out+=label(k,v);});
      if(db.regulation)out+=`\n【レギュレーション】\n${db.regulation}\n`;
      if(db.preview)out+=`\n【今回予告】\n${db.preview}\n`;
      out+='\n';
    }
    out+=hr();
  }

  // blocks in order
  for(const key of S.blockOrder){
    const def=BLOCK_DEFS.find(d=>d.key===key);
    const blk=S.blocks[key];

    if(key==='handout'){
      if(!blk.items.length)continue;
      out+=h2('ハンドアウト');
      blk.items.forEach((ho,i)=>{
        out+=h3(`HO ${String(i+1).padStart(2,'0')} ${ho.name||'(無題)'}`);
        out+=label('コネクション',ho.connection);
        out+=label('条件',ho.condition);
        if(ho.body)out+=(md?`\n${ho.body}\n`:ho.body+'\n');
        out+=label('目的',ho.goal);
        out+='\n';
      });
      out+=hr();
      continue;
    }

    if(key==='honpen'){
      if(!blk.scenes.length)continue;
      out+=h2('本編');
      blk.scenes.forEach((sc,i)=>{
        const npcs=sc.npcIds.map(id=>S.npcs.find(x=>x.id===id)?.name).filter(Boolean);
        out+=h3(`SCENE ${String(i+1).padStart(2,'0')} ${sc.title||'(無題)'}`);
        out+=label('場所',sc.location);
        out+=label('目的',sc.goal);
        if(npcs.length)out+=label('登場NPC',npcs.join('、'));
        if(sc.inlineBlocks&&sc.inlineBlocks.length){
          out+='\n';
          sc.inlineBlocks.forEach(ib=>{
            if(ib.type==='desc'){
              out+=md?`> ${ib.content.replace(/\n/g,'\n> ')}\n\n`:ib.content+'\n';
            } else if(ib.type==='serif'){
              const speaker=ib.speakerId?S.npcs.find(x=>x.id===ib.speakerId):null;
              const speakerPrefix=speaker?(md?`**${speaker.name}**: `:`${speaker.name}：`):'';
              out+=md?`${speakerPrefix}*${ib.content}*\n\n`:`${speakerPrefix}「${ib.content}」\n`;
            } else {
              out+=ib.content+'\n';
            }
          });
        }
        if(sc.memo)out+=label('GMメモ',sc.memo);
        out+='\n';
      });
      out+=hr();
      continue;
    }

    // simple blocks
    const content=(blk.content||'').trim();
    if(!content)continue;
    out+=h2(def.label);
    out+=content+'\n\n';
    out+=hr();
  }

  // NPCs
  if(S.npcs.length){
    out+=h2('NPC');
    S.npcs.forEach(n=>{
      out+=h3(`${n.name||'(名前未設定)'}${n.job?` ／ ${n.job}`:''}${n.age?` （${n.age}）`:''}`);
      if(n.faction)out+=label('陣営',n.faction);
      if(n.appearance)out+=label('外見',n.appearance);
      if(n.body)out+='\n'+(md?n.body:n.body)+'\n\n';
      if(n.roleplay)out+=label('ロールプレイ',n.roleplay);
      if(n.items)out+=label('所持情報・アイテム',n.items);
      if(n.secret)out+=label('GMメモ（秘密）',n.secret);
      out+='\n';
    });
    out+=hr();
  }

  // Infos
  if(S.infos.length){
    out+=h2('情報');
    S.infos.forEach(inf=>{
      out+=h3(inf.name||'(名称未設定)');
      if(inf.condition)out+=label('取得条件',inf.condition);
      if(inf.difficulty)out+=label('難易度',inf.difficulty);
      if(inf.place)out+=label('取得場所',inf.place);
      if(inf.body)out+='\n'+inf.body+'\n\n';
      if(inf.note)out+=label('その他',inf.note);
      out+='\n';
    });
  }

  return out;
}

function buildMarkdown(){return buildScenarioText('md');}
function buildPlainText(){return buildScenarioText('txt');}

let _searchResults=[], _searchIdx=-1;

function toggleSearch(){
  const bar=document.getElementById('search-bar');
  const isOpen=bar.classList.toggle('open');
  if(isOpen){
    document.getElementById('search-input').focus();
    document.getElementById('search-btn').classList.add('btn-accent');
  } else {
    document.getElementById('search-input').value='';
    document.getElementById('search-results').innerHTML='';
    document.getElementById('search-count').textContent='';
    document.getElementById('search-btn').classList.remove('btn-accent');
    _searchResults=[]; _searchIdx=-1;
    _updateSearchNavBtns();
  }
}

// Ctrl+F / Cmd+F で検索バーを開く
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){
    e.preventDefault(); toggleSearch();
  }
  if(e.key==='Escape') {
    const bar=document.getElementById('search-bar');
    if(bar.classList.contains('open')){ toggleSearch(); return; }
    const modal=document.getElementById('modal-overlay');
    if(modal.classList.contains('open')){ closeModal(); return; }
  }
});

function collectSearchTargets(){
  const targets=[];
  const push=(label,text,action)=>{
    if(text&&text.trim()) targets.push({label,text:text.trim(),action});
  };
  const db=S.blocks.dashboard;
  push('ダッシュボード / システム',db.system,()=>selBlock('dashboard'));
  push('ダッシュボード / 推奨参加人数',db.players,()=>selBlock('dashboard'));
  push('ダッシュボード / レギュレーション',db.regulation,()=>selBlock('dashboard'));
  push('ダッシュボード / 今回予告',db.preview,()=>selBlock('dashboard'));
  ['gaiyou','haikei','shinsou','after'].forEach(k=>{
    const def=BLOCK_DEFS.find(d=>d.key===k);
    push(def.label, S.blocks[k].content, ()=>selBlock(k));
  });
  S.blocks.handout.items.forEach(ho=>{
    const lbl=`ハンドアウト / ${ho.name||'(無題)'}`;
    push(lbl+' / 本文',ho.body,()=>selHo(ho.id));
    push(lbl+' / 目的',ho.goal,()=>selHo(ho.id));
    push(lbl+' / コネクション',ho.connection,()=>selHo(ho.id));
    push(lbl+' / 条件',ho.condition,()=>selHo(ho.id));
  });
  S.blocks.honpen.scenes.forEach(sc=>{
    const lbl=`本編 / ${sc.title||'(無題)'}`;
    push(lbl+' / 場所',sc.location,()=>selScene(sc.id));
    push(lbl+' / 目的',sc.goal,()=>selScene(sc.id));
    push(lbl+' / メモ',sc.memo,()=>selScene(sc.id));
    (sc.inlineBlocks||[]).forEach(ib=>{
      if(ib.type!=='image') push(lbl+' / 本文',ib.content,()=>selScene(sc.id));
    });
  });
  S.npcs.forEach(n=>{
    const lbl=`NPC / ${n.name}`;
    push(lbl+' / 外見',n.appearance,()=>selNpc(n.id));
    push(lbl+' / 本文',n.body,()=>selNpc(n.id));
    push(lbl+' / ロールプレイ',n.roleplay,()=>selNpc(n.id));
    push(lbl+' / 所持情報',n.items,()=>selNpc(n.id));
    push(lbl+' / GMメモ',n.secret,()=>selNpc(n.id));
  });
  S.infos.forEach(inf=>{
    const lbl=`情報 / ${inf.name}`;
    push(lbl+' / 取得条件',inf.condition,()=>selInfo(inf.id));
    push(lbl+' / 本文',inf.body,()=>selInfo(inf.id));
    push(lbl+' / その他',inf.note,()=>selInfo(inf.id));
  });
  return targets;
}

function highlight(text, kw, isCurrent=false){
  const safe=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(safe,'gi'),
    m=>`<mark class="${isCurrent?'current-match':''}">${m}</mark>`);
}

function getSnippet(text,kw,radius){
  const i=text.toLowerCase().indexOf(kw.toLowerCase());
  if(i<0)return text.slice(0,radius*2);
  const start=Math.max(0,i-radius);
  const end=Math.min(text.length,i+kw.length+radius);
  return (start>0?'…':'')+text.slice(start,end)+(end<text.length?'…':'');
}

function _updateSearchNavBtns(){
  const has=_searchResults.length>0;
  const prev=document.getElementById('search-prev');
  const next=document.getElementById('search-next');
  if(prev) prev.disabled=!has;
  if(next) next.disabled=!has;
}

function _updateSearchCount(){
  const el=document.getElementById('search-count');
  if(!el) return;
  if(!_searchResults.length){ el.textContent=''; return; }
  el.textContent=_searchIdx>=0
    ? `${_searchIdx+1} / ${_searchResults.length}`
    : `${_searchResults.length}件`;
}

function _renderSearchResults(kw){
  const resEl=document.getElementById('search-results');
  if(!_searchResults.length){
    resEl.innerHTML='<div class="search-result-item" style="color:var(--text-muted);padding:10px 16px;">見つかりませんでした</div>';
    return;
  }
  resEl.innerHTML=_searchResults.map((r,i)=>{
    const isCur=i===_searchIdx;
    const snippet=getSnippet(r.text,kw,60);
    return `<div class="search-result-item${isCur?' current':''}" data-idx="${i}" onclick="jumpToResult(${i})">
      <div class="sr-label">${esc(r.label)}</div>
      <div class="sr-context">${highlight(esc(snippet),esc(kw),isCur)}</div>
    </div>`;
  }).join('');
  if(_searchIdx>=0){
    resEl.querySelector('.search-result-item.current')?.scrollIntoView({block:'nearest'});
  }
}

function doSearch(kw){
  if(!kw||kw.length<1){
    document.getElementById('search-results').innerHTML='';
    document.getElementById('search-count').textContent='';
    _searchResults=[]; _searchIdx=-1;
    _updateSearchNavBtns();
    return;
  }
  const kwL=kw.toLowerCase();
  _searchResults=collectSearchTargets().filter(t=>t.text.toLowerCase().includes(kwL));
  _searchIdx=_searchResults.length>0?0:-1;
  _updateSearchCount();
  _updateSearchNavBtns();
  _renderSearchResults(kw);
}

function searchNav(dir){
  if(!_searchResults.length) return;
  const kw=document.getElementById('search-input').value;
  _searchIdx=(_searchIdx+dir+_searchResults.length)%_searchResults.length;
  _updateSearchCount();
  _renderSearchResults(kw);
}

function jumpToResult(idx){
  const r=_searchResults[idx]; if(!r) return;
  const kw=document.getElementById('search-input').value;
  _searchIdx=idx;
  _updateSearchCount();
  _renderSearchResults(kw);
  r.action();
  toggleSearch();
}

function searchKeyNav(e){
  if(e.key==='Enter'&&e.shiftKey){ e.preventDefault(); searchNav(-1); }
  else if(e.key==='Enter'){        e.preventDefault(); searchNav(1);  }
  else if(e.key==='ArrowDown'){    e.preventDefault(); searchNav(1);  }
  else if(e.key==='ArrowUp'){      e.preventDefault(); searchNav(-1); }
}

function closeViewer(){
  document.getElementById('viewer-overlay').classList.remove('open');

function buildViewerHTML(){
  const db=S.blocks.dashboard;
  let h='';

  // タイトル
  h+=`<div class="v-scenario-title">${esc(S.scenarioName||'TRPG シナリオ')}</div>`;
  const subParts=[db.system,db.players?`${db.players}人`:null,db.playtime].filter(Boolean);
  if(subParts.length) h+=`<div class="v-scenario-sub">${subParts.map(esc).join(' ／ ')}</div>`;

  // シナリオ情報テーブル
  const dbRows=[
    ['システム',db.system],['推奨参加人数',db.players],
    ['キャラクターレベル',db.level],['プレイ時間',db.playtime],
  ].filter(([,v])=>v);
  if(dbRows.length){
    h+=`<table class="v-info-table">${dbRows.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}</table>`;
  }

  if(db.regulation){
    h+=`<div class="v-section">
      <div class="v-section-title">レギュレーション</div>
      <div class="v-body">${esc(db.regulation)}</div>
    </div>`;
  }
  if(db.preview){
    h+=`<div class="v-section">
      <div class="v-section-title">今回予告</div>
      <div class="v-body" style="font-style:italic;">${esc(db.preview)}</div>
    </div>`;
  }

  // ブロックをblockOrderに従って出力（dashboardはスキップ）
  for(const key of S.blockOrder){
    if(key==='dashboard')continue;
    const def=BLOCK_DEFS.find(d=>d.key===key);
    const blk=S.blocks[key];

    if(key==='handout'){
      if(!blk.items.length)continue;
      h+=`<div class="v-divider"></div><div class="v-section"><div class="v-section-title">ハンドアウト</div>`;
      blk.items.forEach((ho,i)=>{
        h+=`<div class="v-ho-card">
          <div class="v-ho-head">
            <span>HO ${String(i+1).padStart(2,'0')}</span>
            <span class="v-ho-name">${esc(ho.name||'(無題)')}</span>
          </div>
          <div class="v-ho-body">
            ${ho.connection?`<div><div class="v-label">コネクション</div><div class="v-value">${esc(ho.connection)}</div></div>`:''}
            ${ho.condition?`<div><div class="v-label">条件</div><div class="v-value">${esc(ho.condition)}</div></div>`:''}
            ${ho.body?`<div class="v-body" style="margin:6px 0;">${esc(ho.body)}</div>`:''}
            ${ho.goal?`<div><div class="v-label">目的</div><div class="v-value">${esc(ho.goal)}</div></div>`:''}
          </div>
        </div>`;
      });
      h+=`</div>`;continue;
    }

    if(key==='honpen'){
      if(!blk.scenes.length)continue;
      h+=`<div class="v-divider"></div><div class="v-section"><div class="v-section-title">本編</div>`;
      blk.scenes.forEach((sc,i)=>{
        const npcs=sc.npcIds.map(id=>S.npcs.find(x=>x.id===id)?.name).filter(Boolean);
        h+=`<div class="v-scene-card">
          <div class="v-scene-head">
            <span class="v-scene-num">SCENE ${String(i+1).padStart(2,'0')}</span>
            <span class="v-scene-name">${esc(sc.title||'(無題)')}</span>
          </div>
          <div class="v-scene-body">
            <div class="v-scene-meta">
              ${sc.location?`<span><b>場所</b>${esc(sc.location)}</span>`:''}
              ${sc.goal?`<span><b>目的</b>${esc(sc.goal)}</span>`:''}
              ${npcs.length?`<span><b>登場NPC</b>${npcs.map(esc).join('、')}</span>`:''}
            </div>
            ${(sc.inlineBlocks||[]).map(ib=>{
              if(ib.type==='image'){
                if(!ib.image) return '';
                return `<div class="v-ib v-ib-image">
                  <img src="${escImg(ib.image)}" alt="${esc(ib.caption||'')}">
                  ${ib.caption?`<div class="v-ib-image-caption">${esc(ib.caption)}</div>`:''}
                </div>`;
              }
              const content = esc(ib.content);
              if(ib.type==='desc') return `<div class="v-ib v-ib-desc">${content}</div>`;
              if(ib.type==='serif'){
                const speaker=ib.speakerId?S.npcs.find(x=>x.id===ib.speakerId):null;
                const speakerHTML=speaker?`<div class="v-serif-speaker">${esc(speaker.name)}</div>`:'';
                return `${speakerHTML}<div class="v-ib v-ib-serif">${content}</div>`;
              }
              return `<div class="v-ib v-ib-text">${content}</div>`;
            }).join('')}
            ${sc.memo?`<div style="margin-top:8px;padding:7px 10px;background:var(--bg-raised);border-radius:4px;font-size:.86rem;color:var(--text-muted);border-left:3px solid var(--border-bright);">
              <span style="font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;">GM MEMO</span><br>${esc(sc.memo)}</div>`:''}
          </div>
        </div>`;
      });
      h+=`</div>`;continue;
    }

    if(key==='dashboard')continue;

    const content=(blk.content||'').trim();
    if(!content)continue;
    h+=`<div class="v-divider"></div>
      <div class="v-section">
        <div class="v-section-title">${esc(def.label)}</div>
        <div class="v-body">${esc(content)}</div>
      </div>`;
  }

  // NPC
  if(S.npcs.length){
    h+=`<div class="v-divider"></div><div class="v-section"><div class="v-section-title">NPC</div>`;
    S.npcs.forEach(n=>{
      h+=`<div class="v-npc-card">
        ${n.image?`<img class="v-npc-image" src="${escImg(n.image)}" alt="${esc(n.name)}">`:''}
        <div class="v-npc-name">${esc(n.name||'(名前未設定)')}</div>
        <div class="v-npc-sub">${[n.job,n.age,n.faction].filter(Boolean).map(esc).join(' ／ ')}</div>
        ${n.appearance?`<div><div class="v-label">外見</div><div class="v-value">${esc(n.appearance)}</div></div>`:''}
        ${n.body?`<div class="v-body" style="margin:6px 0;">${esc(n.body)}</div>`:''}
        ${n.roleplay?`<div><div class="v-label">ロールプレイ</div><div class="v-value">${esc(n.roleplay)}</div></div>`:''}
        ${n.items?`<div><div class="v-label">所持情報・アイテム</div><div class="v-value">${esc(n.items)}</div></div>`:''}
        ${n.secret?`<div style="margin-top:8px;padding:7px 10px;background:var(--bg-raised);border-radius:4px;border-left:3px solid var(--danger);">
          <div class="v-label" style="color:var(--danger-bright);">GM MEMO（秘密）</div>
          <div class="v-value">${esc(n.secret)}</div></div>`:''}
        <div style="clear:both"></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // 情報
  if(S.infos.length){
    h+=`<div class="v-divider"></div><div class="v-section"><div class="v-section-title">情報</div>`;
    S.infos.forEach(inf=>{
      h+=`<div class="v-npc-card">
        <div class="v-npc-name">${esc(inf.name||'(名称未設定)')}</div>
        <div class="v-npc-sub">${[inf.difficulty,inf.place].filter(Boolean).map(esc).join(' ／ ')}</div>
        ${inf.condition?`<div><div class="v-label">取得条件</div><div class="v-value">${esc(inf.condition)}</div></div>`:''}
        ${inf.body?`<div class="v-body" style="margin:6px 0;">${esc(inf.body)}</div>`:''}
        ${inf.note?`<div><div class="v-label">その他</div><div class="v-value">${esc(inf.note)}</div></div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }

  return h;
}

const AUTOSAVE_KEY = 'logos_weaver_autosave';
const AUTOSAVE_META_KEY = 'logos_weaver_autosave_meta';
const AUTOSAVE_INTERVAL_MS = 30000;
const SNAPSHOT_KEY = 'logos_weaver_snapshots';
const SNAPSHOT_MAX = 5;
let _isDirty = false;
let _autosaveTimer = null;
let _currentFileHandle = null;

// ── スナップショット保存 ──
function saveSnapshot(){
  try{
    const S_lite = JSON.parse(JSON.stringify({S,_id}));
    S_lite.S.npcs.forEach(n=>{ delete n.image; });
    S_lite.S.blocks.honpen.scenes.forEach(sc=>{
      sc.inlineBlocks.forEach(ib=>{ if(ib.type==='image') delete ib.image; });
    });
    const snapshots = _loadSnapshots();
    snapshots.push({
      savedAt: new Date().toISOString(),
      scenarioName: S.scenarioName,
      data: S_lite,
    });
    // 最大件数超えたら古いものを破棄
    while(snapshots.length > SNAPSHOT_MAX) snapshots.shift();
    localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snapshots));
  }catch(e){
    if(e.name==='QuotaExceededError' || e.name==='NS_ERROR_DOM_QUOTA_REACHED'){
      // 容量超過時：最古のスナップショットを1件削除して再試行
      try{
        const snapshots = _loadSnapshots();
        if(snapshots.length > 0){
          snapshots.shift();
          localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snapshots));
        } else {
          // それでも無理なら諦めてユーザーに通知
          toast('⚠ 履歴の保存に失敗しました。手動保存（💾）でファイルに残してください。');
        }
      }catch(e2){
        toast('⚠ 履歴の保存に失敗しました。手動保存（💾）でファイルに残してください。');
      }
    } else {
      console.warn('スナップショット保存失敗:', e);
    }
  }
}
function _loadSnapshots(){
  try{
    const raw = localStorage.getItem(SNAPSHOT_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

// ── スナップショット復元モーダル ──
function openSnapshotModal(){
  const snapshots = _loadSnapshots();
  if(!snapshots.length){
    openModal('上書き履歴',`
      <div class="empty-state" style="min-height:80px;">
        <div class="empty-sub">上書き保存の履歴がありません。<br>上書き保存を行うと、直前の状態が最大${SNAPSHOT_MAX}件保持されます。</div>
      </div>`,'閉じる',()=>closeModal(),true);
    document.getElementById('modal-foot').style.display='';
    document.getElementById('modal-cancel').style.display='none';
    document.getElementById('modal-ok').textContent='閉じる';
    document.getElementById('modal-ok').onclick=()=>closeModal();
    return;
  }
  // 新しい順に並べて表示
  const rows = [...snapshots].reverse().map((snap,i)=>{
    const dt = new Date(snap.savedAt);
    const dateStr = `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
    const timeStr = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}:${String(dt.getSeconds()).padStart(2,'0')}`;
    const idx = snapshots.length - 1 - i; // 元配列のインデックス
    const isLatest = i === 0;
    return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);${isLatest?'background:var(--accent-glow);':''}">
      <div style="flex:1;min-width:0;">
        <div style="font-size:.88rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(snap.scenarioName||'(無題)')}</div>
        <div style="font-size:.76rem;color:var(--text-muted);margin-top:2px;font-family:'JetBrains Mono',monospace;">${dateStr} ${timeStr}${isLatest?' <span style="color:var(--accent);margin-left:4px;">最新</span>':''}</div>
      </div>
      <button class="btn btn-sm${isLatest?' btn-accent':''}" onclick="restoreSnapshot(${idx})">この時点に戻す</button>
    </div>`;
  }).join('');
  openModal('上書き履歴（最大'+SNAPSHOT_MAX+'件）',`
    <div style="margin:-16px;border-radius:0 0 6px 6px;overflow:hidden;">
      <div style="padding:10px 12px 8px;font-size:.78rem;color:var(--text-muted);border-bottom:1px solid var(--border);">
        ⚠️ 画像データは含まれません。復元後に手動で再設定してください。
      </div>
      ${rows}
    </div>
  `,'閉じる',()=>closeModal(),true);
  document.getElementById('modal-foot').style.display='';
  document.getElementById('modal-cancel').style.display='none';
  document.getElementById('modal-ok').textContent='閉じる';
  document.getElementById('modal-ok').onclick=()=>closeModal();
}

function restoreSnapshot(idx){
  const snapshots = _loadSnapshots();
  const snap = snapshots[idx];
  if(!snap){ closeModal(); return; }
  confirmModal(
    `${new Date(snap.savedAt).toLocaleString('ja-JP')} の状態に戻しますか？\n現在の編集内容は失われます。（画像データは復元されません）`,
    ()=>{
      try{
        S = snap.data.S;
        _id = snap.data._id || 1;
        if(!S.treeOpen) S.treeOpen={handout:true,honpen:true};
        renderAll();
        setFileHandle(null);
        markDirty();
        toast('スナップショットを復元しました','ok');
      }catch(e){
        toast('復元に失敗しました: '+e.message);
      }
    },
    'この時点に戻す',
    false
  );
}

function setFileHandle(fh){
  _currentFileHandle = fh;
  const btn = document.getElementById('overwrite-btn');
  // FilePicker非対応環境（iOS等）は常に有効（ダウンロード方式で上書き扱い）
  if(btn) btn.disabled = ENV.hasFilePicker ? !fh : false;
}

function markDirty(){
  _isDirty = true;
  setSaveStatus('dirty', '● 未保存の変更あり');
}
function markClean(type='saved'){
  _isDirty = false;
  if(type==='autosave'){
    setSaveStatus('autosaved', '⟳ オートセーブ済み');
    setTimeout(()=>{ if(!_isDirty) setSaveStatus('saved','✓ 保存済み'); }, 3000);
  } else {
    setSaveStatus('saved', '✓ 保存済み');
  }
}
function setSaveStatus(cls, text){
  const el = document.getElementById('save-status');
  if(!el) return;
  el.className = cls;
  el.innerHTML = `<span class="status-dot"></span>${text}`;
}

function autosave(){
  if(!_isDirty) return;
  try{
    // 画像データ（Base64）はlocalStorage容量を圧迫するため除外してオートセーブ
    const S_lite = JSON.parse(JSON.stringify({S,_id}));
    S_lite.S.npcs.forEach(n=>{ delete n.image; });
    S_lite.S.blocks.honpen.scenes.forEach(sc=>{
      sc.inlineBlocks.forEach(ib=>{ if(ib.type==='image') delete ib.image; });
    });
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(S_lite));
    localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({
      savedAt: new Date().toISOString(),
      scenarioName: S.scenarioName,
      note:'画像データはオートセーブに含まれません。手動保存（💾）で保存してください。',
    }));
    markClean('autosave');
    toast('オートセーブしました（画像を除く）', 'autosave');
  }catch(e){
    if(e.name==='QuotaExceededError' || e.name==='NS_ERROR_DOM_QUOTA_REACHED'){
      // localStorage容量超過：古いオートセーブを削除して再試行
      try{
        localStorage.removeItem(AUTOSAVE_KEY);
        localStorage.removeItem(AUTOSAVE_META_KEY);
        toast('⚠️ オートセーブ容量超過。手動保存（💾）してください。');
      }catch(e2){ /* 何もしない */ }
    } else {
      console.warn('オートセーブ失敗:', e);
    }
  }
}

function startAutosaveTimer(){
  if(_autosaveTimer) clearInterval(_autosaveTimer);
  _autosaveTimer = setInterval(autosave, AUTOSAVE_INTERVAL_MS);
}

function checkAutosave(){
  try{
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if(!raw) return;
    const meta = localStorage.getItem(AUTOSAVE_META_KEY);
    const m = meta ? JSON.parse(meta) : {};
    const savedAt = m.savedAt ? new Date(m.savedAt).toLocaleString('ja-JP') : '不明';
    const nameStr = m.scenarioName || '不明';
    document.getElementById('restore-info').textContent =
      `「${nameStr}」\n${savedAt} のオートセーブが見つかりました。復元しますか？`;
    document.getElementById('restore-banner').classList.add('show');
  }catch(e){
    localStorage.removeItem(AUTOSAVE_KEY);
    localStorage.removeItem(AUTOSAVE_META_KEY);
  }
}

function restoreAutosave(){
  try{
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    S = d.S; _id = d._id || 1;
    if(!S.blocks.dashboard) S.blocks.dashboard={system:'',players:'',level:'',playtime:'',regulation:'',preview:''};
    if(!S.treeOpen) S.treeOpen={handout:true,honpen:true};
    renderAll();
    document.getElementById('restore-banner').classList.remove('show');
    markClean('autosave');
    toast('オートセーブを復元しました', 'ok');
  }catch(e){
    toast('復元に失敗しました: ' + e.message);
    dismissRestore();
  }
}

function dismissRestore(){
  document.getElementById('restore-banner').classList.remove('show');
  localStorage.removeItem(AUTOSAVE_KEY);
  localStorage.removeItem(AUTOSAVE_META_KEY);
  toast('オートセーブデータを破棄しました');
}

window.addEventListener('beforeunload', e => {
  if(_isDirty){ e.preventDefault(); e.returnValue = ''; }
});

document.addEventListener('input', () => markDirty());

// ─── ドラッグ・追加・削除などの構造変更でも dirty にする ───
// renderAll/renderBlockList など呼び出し後に markDirty するために
// データ変更を伴う主要関数をラップ

function loadJSON(){document.getElementById('load-input').click();}
function loadJSONFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      S=d.S; _id=d._id||1;
      if(!S.blocks.dashboard) S.blocks.dashboard={system:'',players:'',level:'',playtime:'',regulation:'',preview:''};
      if(!S.treeOpen) S.treeOpen={handout:true,honpen:true};
      renderAll();
      setFileHandle(null); // 読み込んだファイルはFileSystemFileHandleで開いていないのでリセット
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({S,_id}));
      localStorage.setItem(AUTOSAVE_META_KEY, JSON.stringify({savedAt:new Date().toISOString(),scenarioName:S.scenarioName}));
      markClean();
      toast('読み込みました','ok');
    }catch(err){ toast('⚠ 読み込み失敗: '+err.message); }
  };
  r.readAsText(f); e.target.value='';
}
function newScenario(){
  const msg = _isDirty
    ? '未保存の変更があります。\n新規作成すると現在の内容は失われます。続けますか？'
    : '現在の内容をクリアして新規作成しますか？';
  confirmModal(msg, ()=>{
    S={scenarioName:'新しいシナリオ',blockOrder:BLOCK_DEFS.map(b=>b.key),blocks:{dashboard:{system:'',players:'',level:'',playtime:'',regulation:'',preview:''},gaiyou:{content:''},haikei:{content:''},shinsou:{content:''},handout:{items:[]},honpen:{scenes:[]},after:{content:''}},npcs:[],infos:[],sel:{type:null,id:null},treeOpen:{handout:true,honpen:true}};
    _id=1; renderAll(); setFileHandle(null); markClean(); toast('新規作成しました','ok');
  }, '新規作成する', false);
}

function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('theme-btn').textContent=d?'🌙':'☀️';}
let _tt;
let _toastUndoAction = null;
// undoボタンのclickはIIFEスコープ内でセット（HTML属性では_toastUndoActionにアクセス不可のため）
document.getElementById('toast-undo-btn').addEventListener('click', ()=>{
  if(!_toastUndoAction) return;
  const fn = _toastUndoAction;
  _toastUndoAction = null;
  clearTimeout(_tt);
  document.getElementById('toast').className = '';
  document.getElementById('toast-undo-btn').style.display = 'none';
  fn();
});
function toast(msg, type='', undoFn=null){
  const el=document.getElementById('toast');
  const msgEl=document.getElementById('toast-msg');
  const undoBtn=document.getElementById('toast-undo-btn');
  if(msgEl) msgEl.textContent=msg;
  else el.textContent=msg;
  el.className='show '+(type||'');
  _toastUndoAction=undoFn;
  if(undoBtn) undoBtn.style.display=undoFn?'':'none';
  clearTimeout(_tt);
  _tt=setTimeout(()=>{ el.className=''; _toastUndoAction=null; if(undoBtn)undoBtn.style.display='none'; }, undoFn?6000:2400);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Base64画像データのXSS対策：data:image/...;base64, 形式のみ許可
function escImg(src){
  if(!src) return '';
  if(!/^data:image\/(png|jpeg|jpg|gif|webp|svg\+xml);base64,/.test(src)) return '';
  return src.replace(/"/g,'&quot;');
}

function buildHoPrintHTML(hoList){

  const bdr  = isDark?'#2a3045':'#c8bfaa';
  const acc  = isDark?'#c4962a':'#8a5c10';
  const acc2 = isDark?'#5b7fa6':'#2a5a80';
  const raised=isDark?'#1a1e29':'#e5ddd0';

  const cards = hoList.map((ho,i)=>`
    <div class="ho-card">
      <div class="ho-head">
        <span class="ho-num">HO ${String(i+1).padStart(2,'0')}</span>
        <span class="ho-name">${esc(ho.name||'(無題)')}</span>

        ${ho.condition?`<div class="row"><span class="lbl">条件</span><span class="val">${esc(ho.condition)}</span></div>`:''}
        ${ho.body?`<div class="main-text">${esc(ho.body)}</div>`:''}
        ${ho.goal?`<div class="row"><span class="lbl">目的</span><span class="val">${esc(ho.goal)}</span></div>`:''}
      </div>
    </div>`).join('');

  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:${bg};color:${fg};padding:16px;}
.ho-card{border:1px solid ${bdr};border-radius:6px;margin-bottom:20px;overflow:hidden;page-break-inside:avoid;break-inside:avoid;}
.ho-head{background:${raised};padding:10px 16px;display:flex;align-items:baseline;gap:10px;border-bottom:1px solid ${bdr};}
.ho-num{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;color:${acc2};flex-shrink:0;}
.ho-name{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;color:${fg};flex:1;}
.scenario-sub{font-size:.78rem;color:${sub};}
.ho-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.row{display:flex;gap:10px;align-items:flex-start;}
.lbl{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:${sub};min-width:90px;padding-top:3px;flex-shrink:0;}
.val{font-size:.94rem;color:${fg};line-height:1.6;}
.main-text{font-size:.96rem;line-height:1.85;white-space:pre-wrap;border-top:1px solid ${bdr};border-bottom:1px solid ${bdr};padding:10px 0;color:${fg};}
.print-header{font-family:'Cinzel',serif;text-align:center;color:${acc};font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid ${acc};}
@media print{
  body{background:#fff!important;color:#000!important;}
  .ho-card{border-color:#ccc!important;}
  .ho-head{background:#f5f5f5!important;}
  .main-text{border-color:#ccc!important;}
}
</style></head><body>
<div class="print-header">📄 ハンドアウト — ${esc(S.scenarioName)}</div>
${cards}

}

function printHandout(hoId){
  const ho=S.blocks.handout.items.find(x=>x.id===hoId);
  if(!ho)return;
  const idx=S.blocks.handout.items.indexOf(ho);
  const win=window.open('','_blank');
  if(!win){
    toast('⚠ ポップアップがブロックされています。ブラウザの設定でこのサイトのポップアップを許可してください。');
    setTimeout(()=>{ document.getElementById('toast').className=''; }, 6000);
    return;
  }
  win.document.write(buildHoPrintHTML([ho]));
  win.document.close();
  win.onload=()=>setTimeout(()=>win.print(),300);
}

//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  // テキスト入力中はCtrl+Sのみ通す（他はブラウザ/IMEに委ねる）
  const inInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);

  // Ctrl+Shift+S / Cmd+Shift+S → 保存ダイアログ（名前を付けて保存）
  if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='S'){
    e.preventDefault();
    openSaveModal();
    return;
  }

  // Ctrl+S / Cmd+S → 上書き保存（ハンドルなければ保存ダイアログへフォールバック）
  if((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key==='s'){
    e.preventDefault();
    if(_currentFileHandle) overwriteSave();
    else openSaveModal();
    return;
  }

  // 入力中は以下のショートカットをスキップ
  if(inInput) return;

  // Ctrl+1/2/3 → タブ切替
  if((e.ctrlKey||e.metaKey) && e.key==='1'){e.preventDefault();switchTab('blocks');return;}
  if((e.ctrlKey||e.metaKey) && e.key==='2'){e.preventDefault();switchTab('npcs');return;}
  if((e.ctrlKey||e.metaKey) && e.key==='3'){e.preventDefault();switchTab('info');return;}

  // ? → ショートカット一覧
  if(e.key==='?'&&!e.ctrlKey&&!e.metaKey&&!e.shiftKey){
    showShortcutHelp();
    return;
  }
});

<!-- PWA：Service Worker 登録 -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{
        // 新しいバージョンが利用可能なとき更新通知を出す
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', ()=>{
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              // 既存のアプリが動いている状態で新バージョンが来たとき
              const toast = document.getElementById('toast');
              const msgEl = document.getElementById('toast-msg');
              const undoBtn = document.getElementById('toast-undo-btn');
              if(msgEl) msgEl.textContent = '🔄 新しいバージョンが利用可能です';
              if(undoBtn){
                undoBtn.textContent = '今すぐ更新';
                undoBtn.style.display = '';
                undoBtn.onclick = ()=>{
                  newWorker.postMessage('skipWaiting');
                  window.location.reload();
                };
              }
              if(toast) toast.className = 'show autosave';
            }
          });
        });
      })
      .catch(()=>{/* Service Worker非対応環境では無視 */});
  });
}
</script>
